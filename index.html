                : horizontalLayout.polAxisY + 40 + lane * 31;

            const verticalPolX = (lane) => {
                if (mode === 'pol' && isTouchDevice) return Math.max(10, verticalAxisX - 30 - lane * 25);
                return Math.max(10, verticalAxisX - 38 - lane * 28);
            };

            const updateMinimap = (event) => {
                const container = containerRef.current;
                if (!container) return;
                const rect = event.currentTarget.getBoundingClientRect();
                const ratio = isVertical
                    ? (event.clientY - rect.top) / rect.height
                    : (event.clientX - rect.left) / rect.width;
                const clientSize = isVertical ? container.clientHeight : container.clientWidth;
                const scrollSize = isVertical ? container.scrollHeight : container.scrollWidth;
                applyPrimaryScroll(Math.max(0, Math.min(1, ratio)) * scrollSize - clientSize / 2);
            };

            const handleMinimapPointerDown = (event) => {
                event.currentTarget.setPointerCapture?.(event.pointerId);
                updateMinimap(event);
            };

            const toggleTechCategory = (category) => setDisabledTechCategories((items) => items.includes(category) ? items.filter((item) => item !== category) : [...items, category]);
            const togglePolType = (type) => setDisabledPolTypes((items) => items.includes(type) ? items.filter((item) => item !== type) : [...items, type]);
            const clearFilters = () => {
                setDisabledTechCategories([]);
                setDisabledPolTypes([]);
            };
            const hideAllFilters = () => {
                setDisabledTechCategories(TECH_CATEGORY_DEFS.map((category) => category.id));
                setDisabledPolTypes(POL_TYPES);
            };

            const theme = isDarkMode ? {
                bg: 'bg-slate-950',
                text: 'text-slate-100',
                subText: 'text-slate-400',
                axis: '#cbd5e1',
                grid: '#1e293b',
                gridText: '#64748b'
            } : {
                bg: 'bg-slate-50',
                text: 'text-slate-900',
                subText: 'text-slate-500',
                axis: '#475569',
                grid: '#e2e8f0',
                gridText: '#94a3b8'
            };

            const renderToolbar = (mobile = false) => (
                <div className={`toolbar-shell ${mobile ? 'mobile-toolbar' : 'desktop-toolbar'}`} aria-label="Timeline navigation controls">
                    <ToolbarButton label="Zoom out" onClick={() => handleZoom(zoomRef.current * 0.82)}><ZoomOut size={18} /></ToolbarButton>
                    <span className={`w-12 text-center font-mono text-[11px] font-bold ${theme.subText}`}>{Math.round(zoom * 100)}%</span>
                    <ToolbarButton label="Zoom in" onClick={() => handleZoom(zoomRef.current * 1.22)}><ZoomIn size={18} /></ToolbarButton>
                    <div className="toolbar-divider" />
                    <ToolbarButton label="Fit full timeline" onClick={fitTimeline}><Maximize2 size={17} /></ToolbarButton>
                    <ToolbarButton label="Jump to modern era" onClick={jumpToModern}><Navigation size={17} /></ToolbarButton>
                    <ToolbarButton label="Reset view" onClick={resetView}><RefreshCcw size={17} /></ToolbarButton>
                    {mobile && <ToolbarButton label="Open gesture help" onClick={() => setShowHelp(true)}><HelpCircle size={17} /></ToolbarButton>}
                </div>
            );

            const renderHorizontalTimeline = () => (
                <svg width={canvasWidth} height={canvasHeight} className="absolute left-0 top-0 block">
                    {Array.from({ length: Math.ceil(totalYears / horizontalGridStep) + 1 }).map((_, index) => {
                        const year = startYear + index * horizontalGridStep;
                        if (year > endYear) return null;
                        const x = H_PADDING + (year - startYear) * zoom;
                        if (!isPrimaryVisible(x, 120)) return null;
                        return (
                            <g key={year}>
                                <line x1={x} y1={0} x2={x} y2={H_HEIGHT} stroke={theme.grid} strokeWidth={1} strokeDasharray="4 5" />
                                <text x={x + 6} y={horizontalLayout.techAxisY + 17} fontSize={10} fill={theme.gridText} fontFamily="monospace" opacity={0.78}>{formatYear(year)}</text>
                                {mode === 'merged-split' && <text x={x + 6} y={horizontalLayout.polAxisY - 12} fontSize={10} fill={theme.gridText} fontFamily="monospace" opacity={0.78}>{formatYear(year)}</text>}
                            </g>
                        );
                    })}
                    {eraSet.map((era) => {
                        const startX = H_PADDING + (era.start - startYear) * zoom;
                        const endX = H_PADDING + (era.end - startYear) * zoom;
                        const width = Math.max(endX - startX, 1);
                        const color = hexColors[era.color];
                        return (
                            <g key={era.name}>
                                <rect x={startX} y={80} width={width} height={H_HEIGHT - 80} fill={color} fillOpacity={isDarkMode ? 0.12 : 0.25} />
                                {isSpanVisible(startX, endX) && width > 86 && (
                                    <foreignObject x={startX} y={92} width={width} height={38} style={{ overflow: 'visible' }}>
                                        <div className="flex justify-center">
                                            <button type="button" data-timeline-item="true" className={`era-chip ${isSelected('era', era) ? 'is-selected' : ''}`} style={{ backgroundColor: isDarkMode ? `${color}66` : color }} onClick={(event) => selectTimelineItem(event, 'era', era)} onMouseEnter={(event) => showHover(event, 'era', era)} onMouseLeave={() => setHoveredItem(null)}>{era.name}</button>
                                        </div>
                                    </foreignObject>
                                )}
                            </g>
                        );
                    })}
                    {showsPolitics && (
                        <g>
                            <line x1={H_PADDING} y1={horizontalLayout.polAxisY} x2={H_PADDING + totalYears * zoom} y2={horizontalLayout.polAxisY} stroke={theme.axis} strokeWidth={2} />
                            {mode.includes('merged') && <text x={H_PADDING} y={horizontalLayout.polAxisY - 12} fill={theme.axis} fontWeight="800" fontSize={11} letterSpacing="1.4">POLITICS</text>}
                            {layoutPolData.map((system, index) => {
                                const startX = H_PADDING + (system.start - startYear) * zoom;
                                const endX = H_PADDING + (system.end - startYear) * zoom;
                                if (!isSpanVisible(startX, endX)) return null;
                                const width = Math.max(endX - startX, 3);
                                const y = getHorizontalPolBarY(system.lane);
                                const color = polColors[system.type] || '#64748b';
                                return (
                                    <g key={`${system.name}-${index}`} data-timeline-item="true" role="button" tabIndex="0" aria-label={`Open ${system.name} details`} className="cursor-pointer" onClick={(event) => selectTimelineItem(event, 'pol', system)} onKeyDown={(event) => selectItemWithKeyboard(event, 'pol', system)} onMouseEnter={(event) => showHover(event, 'pol', system)} onMouseLeave={() => setHoveredItem(null)}>
                                        <rect x={startX} y={y} width={width} height={25} rx={7} fill={color} fillOpacity={isSelected('pol', system) ? 0.44 : (isDarkMode ? 0.28 : 0.2)} stroke={color} strokeWidth={isSelected('pol', system) ? 3 : 1.4} />
                                        <foreignObject x={startX} y={y} width={width} height={25} style={{ pointerEvents: 'none' }}>
                                            <div className={`flex h-full w-full items-center justify-center gap-1 overflow-hidden px-1 ${isDarkMode ? 'text-slate-100' : 'text-slate-800'}`}><TimelineGlyph kind={getPoliticalGlyph(system.type)} size={13} />{width > 74 && <span className="truncate text-[11px] font-bold">{system.name}</span>}</div>
                                        </foreignObject>
                                    </g>
                                );
                            })}
                        </g>
                    )}
                    {showsTech && (
                        <g>
                            <line x1={H_PADDING} y1={horizontalLayout.techAxisY} x2={H_PADDING + totalYears * zoom} y2={horizontalLayout.techAxisY} stroke={theme.axis} strokeWidth={2} />
                            {mode.includes('merged') && <text x={H_PADDING} y={horizontalLayout.techAxisY + 24} fill={theme.axis} fontWeight="800" fontSize={11} letterSpacing="1.4">TECHNOLOGY</text>}
                            {horizontalTechData.map((item, index) => {
                                const x = H_PADDING + (item.year - startYear) * zoom;
                                if (!isPrimaryVisible(x)) return null;
                                const labelY = getHorizontalTechLabelY(item.lane);
                                return (
                                    <g key={`${item.name}-${index}`} data-timeline-item="true" role="button" tabIndex="0" aria-label={`Open ${item.name} details`} className="cursor-pointer" onClick={(event) => selectTimelineItem(event, 'tech', item)} onKeyDown={(event) => selectItemWithKeyboard(event, 'tech', item)} onMouseEnter={(event) => showHover(event, 'tech', item)} onMouseLeave={() => setHoveredItem(null)}>
                                        <path d={`M ${x} ${horizontalLayout.techAxisY} L ${x} ${labelY}`} stroke={isSelected('tech', item) ? '#2563eb' : theme.gridText} strokeWidth={isSelected('tech', item) ? 2 : 1} opacity={0.72} />
                                        <circle cx={x} cy={horizontalLayout.techAxisY} r={isSelected('tech', item) ? 5 : 3.5} fill={isSelected('tech', item) ? '#2563eb' : theme.axis} />
                                        {zoom > 0.17 && (
                                            <foreignObject x={x - 85} y={labelY} width={170} height={58} style={{ overflow: 'visible' }}>
                                                <div className="flex flex-col items-center text-center">
                                                    <div className={`timeline-label flex items-center gap-1.5 whitespace-nowrap px-2 py-1 text-[11px] font-bold ${theme.text} ${isSelected('tech', item) ? 'is-selected' : ''}`}><TimelineGlyph kind={TECH_CATEGORY_MAP[item.category].glyph} size={13} className="shrink-0 text-blue-500" /><span>{item.name}</span></div>
                                                    {zoom > 0.48 && <div className={`mt-0.5 rounded px-1 font-mono text-[9px] ${theme.subText}`}>{formatYear(item.year)}</div>}
                                                </div>
                                            </foreignObject>
                                        )}
                                    </g>
                                );
                            })}
                        </g>
                    )}
                </svg>
            );

            const renderVerticalTimeline = () => (
                <svg width={canvasWidth} height={canvasHeight} className="absolute left-0 top-0 block">
                    {mode === 'merged-split' && (
                        <>
                            <rect x={0} y={0} width={verticalAxisX} height={canvasHeight} fill="#7c3aed" fillOpacity={isDarkMode ? 0.025 : 0.018} />
                            <rect x={verticalAxisX} y={0} width={canvasWidth - verticalAxisX} height={canvasHeight} fill="#2563eb" fillOpacity={isDarkMode ? 0.025 : 0.018} />
                        </>
                    )}
                    {Array.from({ length: Math.ceil(totalYears / gridStep) + 1 }).map((_, index) => {
                        const year = endYear - index * gridStep;
                        if (year < startYear) return null;
                        const y = V_PADDING + (endYear - year) * zoom;
                        if (!isPrimaryVisible(y, 120)) return null;
                        return (
                            <g key={year}>
                                <line x1={0} y1={y} x2={canvasWidth} y2={y} stroke={theme.grid} strokeWidth={1} strokeDasharray="4 5" />
                                <text x={Math.max(6, verticalAxisX - 54)} y={y - 6} fontSize={10} fill={theme.gridText} fontFamily="monospace" opacity={0.9}>{formatYear(year)}</text>
                            </g>
                        );
                    })}
                    {eraSet.map((era) => {
                        const top = V_PADDING + (endYear - era.end) * zoom;
                        const bottom = V_PADDING + (endYear - era.start) * zoom;
                        const height = Math.max(bottom - top, 1);
                        const color = hexColors[era.color];
                        return (
                            <g key={era.name}>
                                <rect x={0} y={top} width={canvasWidth} height={height} fill={color} fillOpacity={isDarkMode ? 0.1 : 0.2} />
                                {isSpanVisible(top, bottom, 100) && height > 34 && (
                                    <foreignObject x={8} y={top + 8} width={Math.min(canvasWidth - 24, 220)} height={32} style={{ overflow: 'visible' }}>
                                        <button type="button" data-timeline-item="true" className={`era-chip ${isSelected('era', era) ? 'is-selected' : ''}`} style={{ backgroundColor: isDarkMode ? `${color}66` : color }} onClick={(event) => selectTimelineItem(event, 'era', era)}>{era.name}</button>
                                    </foreignObject>
                                )}
                            </g>
                        );
                    })}
                    {mode === 'merged-split' && (
                        <>
                            <text x={verticalAxisX - 14} y={38} textAnchor="end" fill={theme.axis} fontWeight="800" fontSize={10} letterSpacing="1.4">POLITICS</text>
                            <text x={verticalAxisX + 14} y={38} fill={theme.axis} fontWeight="800" fontSize={10} letterSpacing="1.4">TECHNOLOGY</text>
                        </>
                    )}
                    <line x1={verticalAxisX} y1={V_PADDING} x2={verticalAxisX} y2={V_PADDING + totalYears * zoom} stroke={theme.axis} strokeWidth={2.5} />
                    {showsPolitics && layoutPolData.map((system, index) => {
                        const top = V_PADDING + (endYear - system.end) * zoom;
                        const bottom = V_PADDING + (endYear - system.start) * zoom;
                        if (!isSpanVisible(top, bottom)) return null;
                        const height = Math.max(bottom - top, 4);
                        const x = verticalPolX(system.lane);
                        const color = polColors[system.type] || '#64748b';
                        return (
                            <g key={`${system.name}-${index}`} data-timeline-item="true" role="button" tabIndex="0" aria-label={`Open ${system.name} details`} className="cursor-pointer" onClick={(event) => selectTimelineItem(event, 'pol', system)} onKeyDown={(event) => selectItemWithKeyboard(event, 'pol', system)} onMouseEnter={(event) => showHover(event, 'pol', system)} onMouseLeave={() => setHoveredItem(null)}>
                                <rect x={x} y={top} width={22} height={height} rx={8} fill={color} fillOpacity={isSelected('pol', system) ? 0.6 : (isDarkMode ? 0.36 : 0.28)} stroke={color} strokeWidth={isSelected('pol', system) ? 3 : 1.5} />
                                <line x1={x + 22} y1={top} x2={verticalAxisX} y2={top} stroke={color} strokeWidth={1} strokeDasharray="3 3" opacity={0.5} />
                                {height > 54 && (
                                    <foreignObject x={x} y={top} width={22} height={height} style={{ pointerEvents: 'none' }}>
                                        <div className="vertical-ribbon-label text-slate-900 dark:text-slate-100"><TimelineGlyph kind={getPoliticalGlyph(system.type)} size={12} /><span>{system.name}</span></div>
                                    </foreignObject>
                                )}
                            </g>
                        );
                    })}
                    {showsTech && verticalTechData.map((item, index) => {
                        if (!isPrimaryVisible(item.pointY) && !isPrimaryVisible(item.labelY)) return null;
                        const rightSide = item.side === 'right';
                        const cardWidth = isTouchDevice ? Math.min(226, canvasWidth - verticalAxisX - 24) : 214;
                        const cardX = rightSide ? verticalAxisX + 16 : verticalAxisX - cardWidth - 16;
                        const connectorEnd = rightSide ? cardX : cardX + cardWidth;
                        const color = TECH_CATEGORY_MAP[item.category].color;
                        return (
                            <g key={`${item.name}-${index}`} data-timeline-item="true" role="button" tabIndex="0" aria-label={`Open ${item.name} details`} className="cursor-pointer" onClick={(event) => selectTimelineItem(event, 'tech', item)} onKeyDown={(event) => selectItemWithKeyboard(event, 'tech', item)} onMouseEnter={(event) => showHover(event, 'tech', item)} onMouseLeave={() => setHoveredItem(null)}>
                                <path d={`M ${verticalAxisX} ${item.pointY} L ${connectorEnd} ${item.labelY + 14}`} stroke={isSelected('tech', item) ? '#2563eb' : color} strokeWidth={isSelected('tech', item) ? 2.4 : 1.2} opacity={0.7} />
                                <circle cx={verticalAxisX} cy={item.pointY} r={isSelected('tech', item) ? 5 : 3.5} fill={isSelected('tech', item) ? '#2563eb' : color} />
                                {zoom > 0.11 ? (
                                    <foreignObject x={cardX} y={item.labelY} width={cardWidth} height={30} style={{ overflow: 'visible' }}>
                                        <div className={`vertical-card ${isSelected('tech', item) ? 'is-selected' : ''}`}><TimelineGlyph kind={TECH_CATEGORY_MAP[item.category].glyph} size={13} className="shrink-0" style={{ color }} /><span className="truncate">{item.name}</span></div>
                                    </foreignObject>
                                ) : <circle cx={connectorEnd} cy={item.labelY + 14} r={4} fill={color} />}
                            </g>
                        );
                    })}
                </svg>
            );

            const renderMinimap = () => {
                const clientSize = Math.max(1, primaryClientSize);
                const scrollSize = Math.max(1, primaryScrollSize);
                const windowSize = Math.max(6, Math.min(100, clientSize / scrollSize * 100));
                const windowStart = Math.max(0, Math.min(100 - windowSize, primaryScroll / scrollSize * 100));
                return (
                    <div className={`minimap ${isVertical ? 'minimap-vertical' : 'minimap-horizontal'}`} aria-label={`${orientation} timeline minimap`}>
                        <div className="minimap-track" onPointerDown={handleMinimapPointerDown} onPointerMove={(event) => { if (event.buttons) updateMinimap(event); }}>
                            {eraSet.map((era) => {
                                const start = isVertical ? (endYear - era.end) / totalYears * 100 : (era.start - startYear) / totalYears * 100;
                                const size = (era.end - era.start) / totalYears * 100;
                                return <span className="minimap-era" key={era.name} style={isVertical ? { top: `${start}%`, height: `${size}%`, left: 0, right: 0, background: hexColors[era.color] } : { left: `${start}%`, width: `${size}%`, top: 0, bottom: 0, background: hexColors[era.color] }} />;
                            })}
                            <span className="minimap-window" style={isVertical ? { top: `${windowStart}%`, height: `${windowSize}%`, left: 0, right: 0 } : { left: `${windowStart}%`, width: `${windowSize}%`, top: 0, bottom: 0 }} />
                        </div>
                    </div>
                );
            };

            return (
                <div className={`flex h-screen flex-col overflow-hidden font-sans transition-colors duration-300 ${theme.bg} ${isDarkMode ? 'dark' : ''}`}>
                    <header className="app-header z-30">
                        <div className="flex min-w-0 items-center gap-3">
                            <div className="atlas-mark"><Sparkles size={19} /></div>
                            <div className="min-w-0">
                                <div className={`brand-title truncate text-sm font-extrabold uppercase tracking-[0.14em] ${theme.text}`}>Civilization Atlas</div>
                                <div className={`brand-subtitle mt-0.5 text-[11px] font-medium ${theme.subText}`}>{isVertical ? 'Vertical history map' : 'Horizontal history map'}</div>
                            </div>
                        </div>
                        <nav className="mode-strip" aria-label="Timeline mode">
                            {MODE_OPTIONS.map((option) => <ModeButton key={option.id} option={option} mode={mode} onChange={setMode} />)}
                        </nav>
                        <div className="header-action flex items-center justify-end gap-0.5">
                            <ToolbarButton label="Search and jump" onClick={() => setShowSearch(true)}><Search size={18} /></ToolbarButton>
                            <ToolbarButton label="Open timeline filters" onClick={() => setShowFilters(true)}><SlidersHorizontal size={18} /></ToolbarButton>
                            <ToolbarButton label={`Switch to ${isVertical ? 'horizontal' : 'vertical'} timeline`} onClick={switchOrientation}>{isVertical ? <ArrowLeftRight size={18} /> : <ArrowUpDown size={18} />}</ToolbarButton>
                            <ToolbarButton label={isDarkMode ? 'Use light theme' : 'Use dark theme'} onClick={() => setIsDarkMode(!isDarkMode)}>{isDarkMode ? <Sun size={18} /> : <Moon size={18} />}</ToolbarButton>
                            <div className="hidden md:block"><ToolbarButton label="Open gesture help" onClick={() => setShowHelp(true)}><HelpCircle size={18} /></ToolbarButton></div>
                            {renderToolbar()}
                        </div>
                    </header>

                    <main
                        ref={containerRef}
                        className={`timeline-canvas relative flex-1 overflow-auto ${isDragging ? 'is-dragging' : ''}`}
                        aria-label={`Interactive ${orientation} civilization timeline`}
                        onScroll={syncViewport}
                        onPointerDown={handlePointerDown}
                        onPointerMove={handlePointerMove}
                        onPointerUp={(event) => finishPointer(event)}
                        onPointerCancel={(event) => finishPointer(event, true)}
                        onPointerLeave={(event) => { if (event.pointerType === 'mouse' && !activePointersRef.current.size) setCursorYear(null); }}
                    >
                        <div className="pointer-events-none sticky left-0 top-0 z-20 flex h-0 w-screen justify-center">
                            <div className={`mt-3 hidden items-center gap-2 rounded-full border px-3 py-1.5 text-[11px] font-bold shadow-sm backdrop-blur-md md:flex ${isDarkMode ? 'border-slate-700 bg-slate-900/75 text-slate-300' : 'border-slate-200 bg-white/80 text-slate-600'}`}>
                                <Hand size={14} /><span>{isVertical ? 'Newest at the top. Drag vertically to travel through time.' : 'Drag or scroll to explore the timeline.'}</span>
                            </div>
                            {isVertical && mode === 'merged-split' && (
                                <div className={`mt-3 flex items-center gap-2 rounded-full border px-3 py-1.5 text-[9px] font-extrabold uppercase tracking-[0.14em] shadow-sm backdrop-blur-md md:hidden ${isDarkMode ? 'border-slate-700 bg-slate-900/80 text-slate-200' : 'border-slate-200 bg-white/85 text-slate-700'}`}>
                                    <span>Politics</span><span className="text-blue-500">Shared years</span><span>Technology</span>
                                </div>
                            )}
                        </div>
                        <div className="relative" style={{ width: `${canvasWidth}px`, height: `${canvasHeight}px` }}>
                            {isVertical ? renderVerticalTimeline() : renderHorizontalTimeline()}
                        </div>
                    </main>

                    {!selectedItem && !showSearch && !showFilters && renderMinimap()}
                    {!selectedItem && !showSearch && !showFilters && renderToolbar(true)}

                    {!isTouchDevice && cursorYear !== null && !isDragging && (
                        <div className="pointer-events-none fixed z-50 -translate-x-1/2 -translate-y-full rounded-full bg-blue-600 px-2 py-1 text-[11px] font-bold text-white shadow-md" style={{ left: mousePos.x, top: mousePos.y - 10 }}>{formatYear(cursorYear)}</div>
                    )}
                    {!isTouchDevice && hoveredItem && !selectedItem && (
                        <div className={`pointer-events-none fixed z-50 w-72 -translate-x-1/2 -translate-y-full rounded-2xl border p-4 shadow-2xl backdrop-blur-md ${isDarkMode ? 'border-slate-600 bg-slate-800/95 text-slate-100' : 'border-slate-200 bg-white/95 text-slate-800'}`} style={{ left: hoveredItem.x, top: hoveredItem.y - 12 }}><DetailContent item={hoveredItem} /></div>
                    )}
                    {selectedItem && (
                        <aside className="detail-sheet" role="dialog" aria-label={`${selectedItem.data.name} details`}>
                            <button type="button" className="icon-button absolute right-2 top-2" aria-label="Close details" title="Close details" onClick={() => setSelectedItem(null)}><X size={18} /></button>
                            <div className="pr-8"><DetailContent item={selectedItem} onRelated={(name) => focusAndSelect(findItemByName(name))} /></div>
                        </aside>
                    )}

                    {showSearch && (
                        <div className="utility-backdrop" role="presentation" onClick={(event) => { if (event.target === event.currentTarget) setShowSearch(false); }}>
                            <section className="utility-panel" role="dialog" aria-modal="true" aria-labelledby="search-title">
                                <div className="flex items-start justify-between gap-3">
                                    <div><div className="text-[10px] font-extrabold uppercase tracking-[0.2em] text-blue-500">Navigate</div><h2 id="search-title" className="mt-1 text-2xl font-extrabold">Search the atlas</h2></div>
                                    <ToolbarButton label="Close search" onClick={() => setShowSearch(false)}><X size={18} /></ToolbarButton>
                                </div>
                                <form className="mt-4 flex gap-2" onSubmit={submitJump}>
                                    <input className="utility-input" aria-label="Jump to year" placeholder="Jump to year: 1950, 500 BCE, -500" value={jumpInput} onChange={(event) => setJumpInput(event.target.value)} />
                                    <button type="submit" className="icon-button shrink-0 border border-slate-200 dark:border-slate-600" aria-label="Jump to entered year" title="Jump to entered year"><CornerDownLeft size={18} /></button>
                                </form>
                                {jumpError && <div className="mt-2 text-xs font-semibold text-rose-500">{jumpError}</div>}
                                <div className="mt-4"><input className="utility-input" autoFocus aria-label="Search timeline items" placeholder="Search technologies, political systems, eras..." value={searchQuery} onChange={(event) => setSearchQuery(event.target.value)} /></div>
                                <div className="mt-3 max-h-80 space-y-1 overflow-auto">
                                    {filteredSearchResults.map((item) => (
                                        <button type="button" className="result-row" key={item.key} onClick={() => { focusAndSelect(item); setShowSearch(false); }}>
                                            <span className="grid h-8 w-8 shrink-0 place-items-center rounded-lg bg-blue-50 text-blue-600 dark:bg-blue-950/60 dark:text-blue-300"><TimelineGlyph kind={getItemGlyph(item)} size={15} /></span>
                                            <span className="min-w-0 flex-1"><span className="block truncate text-sm font-extrabold">{item.data.name}</span><span className="block truncate font-mono text-[10px] text-slate-500 dark:text-slate-400">{item.type === 'tech' ? 'TECH' : item.type === 'pol' ? 'POLITICS' : 'ERA'} / {getItemDate(item)}</span></span>
                                        </button>
                                    ))}
                                </div>
                            </section>
                        </div>
                    )}

                    {showFilters && (
                        <div className="utility-backdrop" role="presentation" onClick={(event) => { if (event.target === event.currentTarget) setShowFilters(false); }}>
                            <section className="utility-panel" role="dialog" aria-modal="true" aria-labelledby="filter-title">
                                <div className="flex items-start justify-between gap-3">
                                    <div><div className="text-[10px] font-extrabold uppercase tracking-[0.2em] text-blue-500">Legend and filters</div><h2 id="filter-title" className="mt-1 text-2xl font-extrabold">Tune the timeline</h2></div>
                                    <ToolbarButton label="Close filters" onClick={() => setShowFilters(false)}><X size={18} /></ToolbarButton>
                                </div>
                                <div className="mt-4 flex flex-wrap gap-2"><button type="button" className="filter-chip" onClick={clearFilters}>Show all</button><button type="button" className="filter-chip" onClick={clearFilters}>Clear filters</button><button type="button" className="filter-chip" onClick={hideAllFilters}>Hide all</button></div>
                                <div className="mt-5 text-[10px] font-extrabold uppercase tracking-[0.18em] text-slate-400">Technology categories</div>
                                <div className="mt-2 flex flex-wrap gap-2">
                                    {TECH_CATEGORY_DEFS.map((category) => <button type="button" className={`filter-chip ${disabledTechCategories.includes(category.id) ? 'is-off' : ''}`} key={category.id} onClick={() => toggleTechCategory(category.id)}><span className="h-2.5 w-2.5 rounded-full" style={{ background: category.color }} /><TimelineGlyph kind={category.glyph} size={13} />{category.label}</button>)}
                                </div>
                                <div className="mt-5 text-[10px] font-extrabold uppercase tracking-[0.18em] text-slate-400">Political system types</div>
                                <div className="mt-2 flex flex-wrap gap-2">
                                    {POL_TYPES.map((type) => <button type="button" className={`filter-chip ${disabledPolTypes.includes(type) ? 'is-off' : ''}`} key={type} onClick={() => togglePolType(type)}><span className="h-2.5 w-2.5 rounded-full" style={{ background: polColors[type] }} /><TimelineGlyph kind={getPoliticalGlyph(type)} size={13} />{type}</button>)}
                                </div>
                            </section>
                        </div>
                    )}

                    {showHelp && (
                        <div className="help-backdrop" role="presentation" onClick={(event) => { if (event.target === event.currentTarget) setShowHelp(false); }}>
                            <section className="help-panel" role="dialog" aria-modal="true" aria-labelledby="gesture-help-title">
                                <div className="flex items-start justify-between gap-4"><div><div className="text-[10px] font-extrabold uppercase tracking-[0.2em] text-blue-500">Timeline guide</div><h2 id="gesture-help-title" className="mt-1 text-2xl font-extrabold tracking-tight">Explore like a map</h2></div><ToolbarButton label="Close help" onClick={() => setShowHelp(false)}><X size={18} /></ToolbarButton></div>
                                <div className="mt-4 orientation-pill">{isVertical ? <ArrowUpDown size={14} /> : <ArrowLeftRight size={14} />} {isVertical ? 'Vertical: newest at top, oldest at bottom' : 'Horizontal: oldest left, newest right'}</div>
                                <div className="mt-5 grid gap-5 md:grid-cols-2"><div><h3 className="text-sm font-extrabold">Desktop</h3><ul className="mt-2 space-y-2 text-sm leading-5 text-slate-600 dark:text-slate-300"><li>Hover for a preview and click to pin details.</li><li>Drag or scroll to move through time.</li><li>Hold Alt while scrolling to zoom.</li><li>Use search, filters, or the minimap for fast navigation.</li></ul></div><div><h3 className="text-sm font-extrabold">Touch</h3><ul className="mt-2 space-y-2 text-sm leading-5 text-slate-600 dark:text-slate-300"><li>Drag with one finger to pan.</li><li>Pinch or drag with two fingers to zoom and move.</li><li>Tap an item for a detail sheet.</li><li>Double tap empty space to zoom in.</li></ul></div></div>
                            </section>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<TimelineAppPass2 />);
    </script>
</body>

</html>
