<html lang="en">

    <!-- React & ReactDOM -->

    <style>
        :root {
            color-scheme: light;
        }

        html,
        body,
        #root {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            overscroll-behavior: none;
            background: #f8fafc;
        }

        button {
            -webkit-tap-highlight-color: transparent;
        }

        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        .dark ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .app-header {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 18px;
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
            backdrop-filter: blur(18px);
        }

        .dark .app-header {
            border-color: #334155;
            background: rgba(15, 23, 42, 0.92);
            box-shadow: 0 8px 24px rgba(2, 6, 23, 0.25);
        }

        .atlas-mark {
            display: grid;
            width: 36px;
            height: 36px;
            place-items: center;
            border-radius: 12px;
            color: #2563eb;
            background: linear-gradient(135deg, #dbeafe, #e0e7ff);
            box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.12);
        }

        .dark .atlas-mark {
            color: #93c5fd;
            background: linear-gradient(135deg, rgba(30, 64, 175, 0.5), rgba(67, 56, 202, 0.45));
            box-shadow: inset 0 0 0 1px rgba(147, 197, 253, 0.2);
        }

        .mode-strip {
            display: flex;
            justify-self: center;
            padding: 4px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            background: #f1f5f9;
        }

        .dark .mode-strip {
            border-color: #334155;
            background: #0f172a;
        }

        .mode-button {
            display: flex;
            min-height: 38px;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 0 12px;
            border-radius: 10px;
            color: #64748b;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: -0.01em;
            transition: color 160ms ease, background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
        }

        .mode-button:hover {
            color: #0f172a;
            transform: translateY(-1px);
        }

        .mode-button.is-active {
            color: #0f172a;
            background: #ffffff;
            box-shadow: 0 3px 10px rgba(15, 23, 42, 0.1);
        }

        .dark .mode-button {
            color: #94a3b8;
        }

        .dark .mode-button:hover,
        .dark .mode-button.is-active {
            color: #f8fafc;
        }

        .dark .mode-button.is-active {
            background: #1e293b;
            box-shadow: 0 3px 12px rgba(2, 6, 23, 0.35);
        }

        .icon-button {
            display: inline-grid;
            min-width: 40px;
            min-height: 40px;
            place-items: center;
            border-radius: 10px;
            color: #64748b;
            transition: color 160ms ease, background 160ms ease, transform 160ms ease;
        }

        .icon-button:hover {
            color: #0f172a;
            background: #f1f5f9;
            transform: translateY(-1px);
        }

        .dark .icon-button {
            color: #94a3b8;
        }

        .dark .icon-button:hover {
            color: #f8fafc;
            background: #334155;
        }

        .toolbar-shell {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 3px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(16px);
        }

        .dark .toolbar-shell {
            border-color: #334155;
            background: rgba(30, 41, 59, 0.92);
            box-shadow: 0 8px 20px rgba(2, 6, 23, 0.26);
        }

        .toolbar-divider {
            width: 1px;
            height: 22px;
            margin: 0 3px;
            background: #e2e8f0;
        }

        .dark .toolbar-divider {
            background: #475569;
        }

        .timeline-canvas {
            touch-action: none;
            overscroll-behavior: contain;
            cursor: grab;
            scrollbar-gutter: stable;
        }

        .timeline-canvas.is-dragging {
            cursor: grabbing;
        }

        svg [role="button"] {
            outline: none;
        }

        svg [role="button"]:focus-visible {
            filter: drop-shadow(0 0 4px rgba(37, 99, 235, 0.7));
        }

        .era-chip:focus-visible {
            outline: 2px solid #2563eb;
            outline-offset: 3px;
        }

        .era-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 26px;
            padding: 4px 11px;
            border: 1px solid rgba(15, 23, 42, 0.1);
            border-radius: 999px;
            color: #1e293b;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            line-height: 1;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.1);
            cursor: pointer;
            transition: transform 160ms ease, box-shadow 160ms ease;
        }

        .era-chip:hover,
        .era-chip.is-selected {
            transform: translateY(-2px);
            box-shadow: 0 7px 14px rgba(15, 23, 42, 0.16);
        }

        .dark .era-chip {
            color: #f8fafc;
            border-color: rgba(248, 250, 252, 0.16);
        }

        .timeline-label {
            border: 1px solid rgba(148, 163, 184, 0.34);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 3px 9px rgba(15, 23, 42, 0.07);
            transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
        }

        .timeline-label:hover,
        .timeline-label.is-selected {
            border-color: rgba(37, 99, 235, 0.55);
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.16);
            transform: translateY(-2px);
        }

        .dark .timeline-label {
            border-color: rgba(100, 116, 139, 0.7);
            background: rgba(30, 41, 59, 0.94);
        }

        .detail-sheet {
            position: fixed;
            right: 18px;
            bottom: 18px;
            z-index: 70;
            width: min(360px, calc(100vw - 32px));
            padding: 18px;
            border: 1px solid rgba(203, 213, 225, 0.9);
            border-radius: 18px;
            color: #1e293b;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 22px 48px rgba(15, 23, 42, 0.22);
            backdrop-filter: blur(18px);
        }

        .dark .detail-sheet {
            border-color: rgba(71, 85, 105, 0.9);
            color: #f1f5f9;
            background: rgba(30, 41, 59, 0.97);
            box-shadow: 0 22px 48px rgba(2, 6, 23, 0.5);
        }

        .help-backdrop {
            position: fixed;
            inset: 0;
            z-index: 90;
            display: grid;
            place-items: center;
            padding: 18px;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(7px);
        }

        .help-panel {
            width: min(640px, 100%);
            padding: 22px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            color: #1e293b;
            background: #ffffff;
            box-shadow: 0 24px 64px rgba(15, 23, 42, 0.28);
        }

        .dark .help-panel {
            border-color: #475569;
            color: #f1f5f9;
            background: #1e293b;
        }

        .mobile-toolbar {
            position: fixed;
            left: 50%;
            bottom: 14px;
            z-index: 60;
            transform: translateX(-50%);
        }

        @media (max-width: 1100px) {
            .brand-subtitle,
            .desktop-hint {
                display: none !important;
            }
        }

        @media (max-width: 767px) {
            .app-header {
                grid-template-columns: minmax(0, 1fr) auto;
                gap: 8px;
                padding: 8px 10px;
            }

            .brand-title {
                font-size: 14px;
            }

            .atlas-mark {
                width: 32px;
                height: 32px;
                border-radius: 10px;
            }

            .mode-strip {
                grid-column: 1 / -1;
                grid-row: 2;
                width: 100%;
                padding: 3px;
                border-radius: 12px;
            }

            .mode-button {
                flex: 1;
                min-width: 0;
                min-height: 38px;
                padding: 0 5px;
                font-size: 12px;
            }

            .mode-button svg {
                display: none;
            }

            .desktop-toolbar,
            .desktop-hint {
                display: none !important;
            }

            .icon-button {
                min-width: 42px;
                min-height: 42px;
            }

            .detail-sheet {
                right: 0;
                bottom: 0;
                left: 0;
                width: 100%;
                padding: 18px 18px max(20px, env(safe-area-inset-bottom));
                border-right: 0;
                border-bottom: 0;
                border-left: 0;
                border-radius: 22px 22px 0 0;
            }
        }

        @media (min-width: 768px) {
            .mobile-toolbar {
                display: none;
            }
        }
    </style>
</head>

            { year: 1990, name: "World Wide Web" },
            { year: 1996, name: "Cloning (Dolly)" },
            { year: 2004, name: "Social Media" },
            { year: 2007, name: "Smartphone" },
            { year: 2009, name: "Blockchain" },
            { year: 2012, name: "CRISPR/Cas9" },
            { year: 2015, name: "Reusable Rockets" },
            { year: 2020, name: "mRNA Vaccines" },
            { year: 2022, name: "Generative AI" },
            { year: 2024, name: "Commercial Fusion (Exp)" }
        ];

        const POL_ERAS = [
            { name: "Pre-State / Bands", start: -10000, end: -3500, color: "stone", description: "Small, kin-based, egalitarian hunter-gatherer bands and early tribes." },
            { name: "Ancient Empires", start: -3500, end: 500, color: "orange", description: "Rise of city-states, god-kings, and the first vast territorial empires." },
            { name: "Medieval / Feudal", start: 500, end: 1500, color: "violet", description: "Decentralized feudalism, religious authority, and dynastic kingdoms." },
            { name: "Early Modern", start: 1500, end: 1789, color: "pink", description: "Absolutism, emergence of sovereignty, and the Westphalian nation-state." },
            { name: "Age of Revolution", start: 1789, end: 1945, color: "rose", description: "Spread of democracy, nationalism, fascism, and communism." },
            { name: "Global Era", start: 1945, end: 2035, color: "sky", description: "Internationalism, supranational unions, and modern statecraft." }
        ];

        const POLITICAL_SYSTEMS = [
            { name: "Band Societies", start: -10000, end: -3000, type: "Tribal", description: "Small, egalitarian, kin-based groups. No formal leadership." },
            { name: "Tribes & Chiefdoms", start: -8000, end: -1000, type: "Tribal", description: "Larger groups with centralized leadership but no bureaucracy." },
            { name: "City-States (Sumerian)", start: -3500, end: -2000, type: "City-State", description: "Independent sovereign cities with surrounding territory (e.g., Uruk)." },
            { name: "God-King Theocracy", start: -3100, end: -1070, type: "Monarchy", description: "Rulers viewed as living gods or divine intermediaries (e.g., Old Kingdom Egypt)." },
            { name: "Territorial Empires", start: -2334, end: -330, type: "Empire", description: "Centralized rule over diverse peoples (e.g., Akkadian, Persian)." },
            { name: "Classical Republics", start: -509, end: -27, type: "Republic", description: "Public affair governance with some representation (e.g., Roman Republic)." },
            { name: "Direct Democracy", start: -508, end: -322, type: "Democracy", description: "Citizens vote directly on legislation (e.g., Athens)." },
            { name: "Imperial Bureaucracy", start: -221, end: 1911, type: "Empire", description: "Meritocratic or centralized civil service rule (e.g., Imperial China)." },
            { name: "Feudalism", start: 800, end: 1500, type: "Feudal", description: "Hierarchy of land ownership and service duties." },
            { name: "Merchant Republics", start: 1000, end: 1797, type: "Republic", description: "Oligarchic city-states run by merchant families (e.g., Venice)." },
            { name: "Absolute Monarchy", start: 1450, end: 1789, type: "Monarchy", description: "Monarch holds supreme autocratic authority." },
            { name: "Westphalian Nation-State", start: 1648, end: 2035, type: "State", description: "Sovereignty based on territorial borders and non-interference." },
            { name: "Constitutional Monarchy", start: 1688, end: 2035, type: "Mixed", description: "Monarch acts as head of state within parameters of a constitution." },
            { name: "Liberal Democracy", start: 1776, end: 2035, type: "Democracy", description: "Representative democracy protecting individual liberty." },
            { name: "Federalism", start: 1787, end: 2035, type: "System", description: "Power divided between central authority and constituent units." },
            { name: "Fascism", start: 1922, end: 1945, type: "Authoritarian", description: "Far-right, authoritarian ultranationalism." },
            { name: "Communism (State)", start: 1917, end: 1991, type: "Authoritarian", description: "Single-party state planning aimed at common ownership." },
            { name: "Welfare State", start: 1945, end: 2035, type: "System", description: "State plays key role in protection of economic and social well-being." },
            { name: "Supranational Unions", start: 1952, end: 2035, type: "Global", description: "Member states delegate power to a central authority (e.g., EU)." }
        ];

        // --- HELPERS ---

        const formatYear = (year) => {
            if (year < 0) return `${Math.abs(Math.floor(year))} BCE`;
            return `${Math.floor(year)} CE`;
        };

        // Specific Hex Codes for Vibrancy (Restored)
        const hexColors = {
            stone: "#e5e7eb",   // Gray 200
            orange: "#fdba74",  // Orange 300
            slate: "#94a3b8",   // Slate 400
            violet: "#a78bfa",  // Violet 400
            pink: "#f472b6",    // Pink 400
            rose: "#fb7185",    // Rose 400
            sky: "#38bdf8",     // Sky 400
            emerald: "#34d399"  // Emerald 400
        };

        // Political bar colors
        const polColors = {
            'Tribal': '#a8a29e',
            'City-State': '#f59e0b',
            'Empire': '#b91c1c',
            'Monarchy': '#7c3aed',
            'Republic': '#0ea5e9',
            'Feudal': '#8b5cf6',
            'Democracy': '#10b981',
            'State': '#3b82f6',
            'Authoritarian': '#57534e',
            'Mixed': '#ec4899',
            'System': '#0891b2',
            'Global': '#6366f1'
        };

        const layoutPoliticalLanes = (systems) => {
            const lanes = [];
            const sortedSystems = [...systems].sort((a, b) => a.start - b.start);
            return sortedSystems.map(sys => {
                let laneIndex = lanes.findIndex(laneEndTime => laneEndTime < sys.start - 50);
                if (laneIndex === -1) {
                    lanes.push(sys.end);
                    laneIndex = lanes.length - 1;
                } else {
                    lanes[laneIndex] = Math.max(lanes[laneIndex], sys.end);
                }
                return { ...sys, lane: laneIndex };
            });
        };

        const MODE_OPTIONS = [
            { id: 'tech', label: 'Tech', icon: Cpu },
            { id: 'pol', label: 'Politics', icon: Landmark },
            { id: 'merged-overlap', label: 'Unified', icon: Layers },
            { id: 'merged-split', label: 'Split', icon: Split }
        ];

        const itemKey = (type, data) => `${type}:${data.name}`;

        const getTechGlyph = (name) => {
            const value = name.toLowerCase();
            if (/agriculture|domestication|irrigation/.test(value)) return 'sprout';
            if (/pottery|glass/.test(value)) return 'vessel';
            if (/boat|wheel|chariot|locomotive|automobile|airplane|rocket/.test(value)) return value.includes('rocket') ? 'rocket' : 'transport';
            if (/writing|papyrus|paper|alphabet|printing|type/.test(value)) return 'document';
            if (/bronze|iron|crane|concrete|plastics|spinning/.test(value)) return 'tools';
            if (/battery|lightning|bulb|reactor|fusion|engine/.test(value)) return 'energy';
            if (/vaccin|anesthesia|x-rays|penicillin|dna|cloning|crispr/.test(value)) return 'health';
            if (/telegraph|telephone|radio|television|internet|web|mobile|social/.test(value)) return 'signal';
            if (/transistor|circuit|processor|computer|smartphone|blockchain|ai/.test(value)) return 'chip';
            if (/microscope|telescope|laser/.test(value)) return 'science';
            if (/satellite|moon landing/.test(value)) return 'rocket';
            return 'spark';
        };

        const getPoliticalGlyph = (type) => {
            if (type === 'Tribal') return 'users';
            if (type === 'City-State' || type === 'State') return 'building';
            if (type === 'Empire' || type === 'Monarchy') return 'crown';
            if (type === 'Republic' || type === 'Democracy' || type === 'Mixed') return 'ballot';
            if (type === 'Authoritarian') return 'shield';
            if (type === 'Feudal') return 'castle';
            if (type === 'Global') return 'globe';
            return 'network';
        };

        const getItemGlyph = (item) => {
            if (item.type === 'tech') return getTechGlyph(item.data.name);
            if (item.type === 'pol') return getPoliticalGlyph(item.data.type);
            return 'spark';
        };

        const getItemCategory = (item) => {
            if (item.type === 'era') return 'Historical era';
            if (item.type === 'pol') return item.data.type;
            return 'Innovation';
        };

        const getItemDate = (item) => {
            if (item.type === 'tech') return formatYear(item.data.year);
            const end = item.type === 'pol' && item.data.end > 2024 ? 'Present' : formatYear(item.data.end);
            return `${formatYear(item.data.start)} - ${end}`;
        };

        const getItemDescription = (item) => {
            if (item.data.description) return item.data.description;
            return 'A milestone on the technology timeline. Explore nearby events to see how innovation accelerates across eras.';
        };

        const ToolbarButton = ({ label, children, onClick }) => (
            <button type="button" className="icon-button" aria-label={label} title={label} onClick={onClick}>
                {children}
            </button>
        );

        const ModeButton = ({ option, mode, onChange }) => {
            const Icon = option.icon;
            const active = mode === option.id;
            return (
                <button
                    type="button"
                    className={`mode-button ${active ? 'is-active' : ''}`}
                    aria-pressed={active}
                    onClick={() => onChange(option.id)}
                >
                    <Icon size={16} />
                    <span>{option.label}</span>
                </button>
            );
        };

        const DetailContent = ({ item }) => (
            <>
                <div className="flex items-center gap-2 text-[10px] font-extrabold uppercase tracking-[0.18em] text-slate-400">
                    <TimelineGlyph kind={getItemGlyph(item)} size={15} />
                    <span>{getItemCategory(item)}</span>
                </div>
                <h3 className="mt-2 text-xl font-extrabold tracking-tight">{item.data.name}</h3>
                <div className="mt-1 font-mono text-xs text-slate-500 dark:text-slate-400">{getItemDate(item)}</div>
                <p className="mt-3 text-sm leading-6 text-slate-600 dark:text-slate-300">{getItemDescription(item)}</p>
            </>
        );

        function TimelineApp() {
            const [mode, setMode] = useState('tech');
            const [zoom, setZoom] = useState(1);
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [hoveredItem, setHoveredItem] = useState(null);
            const [selectedItem, setSelectedItem] = useState(null);
            const [cursorYear, setCursorYear] = useState(null);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [showHelp, setShowHelp] = useState(false);
            const [isTouchDevice, setIsTouchDevice] = useState(false);
            const [isDragging, setIsDragging] = useState(false);

            const containerRef = useRef(null);
            const nextScrollLeft = useRef(null);
            const zoomRef = useRef(1);
            const activePointersRef = useRef(new Map());
            const gestureRef = useRef({ lastMidpoint: null, lastDistance: 0, moved: false });
            const suppressClickUntilRef = useRef(0);
            const lastTapRef = useRef({ time: 0, x: 0, y: 0 });

            const startYear = -10000;
            const endYear = 2035;
            const totalYears = endYear - startYear;
            const PADDING_LEFT = 50;
            const TIMELINE_HEIGHT = 820;
            const MIN_ZOOM = 0.025;
            const MAX_ZOOM = 12;
            const timelineWidth = totalYears * zoom;
            const canvasWidth = timelineWidth + PADDING_LEFT + 280;

            const layoutPolData = useMemo(() => layoutPoliticalLanes(POLITICAL_SYSTEMS), []);

            const layout = useMemo(() => {
                const isSplit = mode === 'merged-split';
                const isOverlap = mode === 'merged-overlap';
                const centerY = TIMELINE_HEIGHT / 2;

                return {
                    techAxisY: isSplit ? TIMELINE_HEIGHT * 0.66 : (isOverlap ? centerY + 34 : 292),
                    polAxisY: isSplit ? TIMELINE_HEIGHT * 0.36 : (isOverlap ? centerY + 34 : 242),
                    polDirection: isSplit || isOverlap ? -1 : 1,
                    showTech: mode === 'tech' || isOverlap || isSplit,
                    showPol: mode === 'pol' || isOverlap || isSplit,
                    eraSet: mode === 'pol' ? POL_ERAS : TECH_ERAS
                };
            }, [mode]);

            const layoutTechData = useMemo(() => {
                const laneCount = mode === 'tech' ? 16 : 11;
                const laneEnds = Array.from({ length: laneCount }, () => -Infinity);

                return INVENTIONS.map((invention) => {
                    const x = (invention.year - startYear) * zoom + PADDING_LEFT;
                    let lane = laneEnds.findIndex((laneEnd) => x - laneEnd > 176);
                    if (lane === -1) lane = laneEnds.indexOf(Math.min(...laneEnds));
                    laneEnds[lane] = x;
                    return { ...invention, lane };
                });
            }, [mode, zoom]);

            const clampZoom = (value) => Math.max(MIN_ZOOM, Math.min(value, MAX_ZOOM));
            const yearToX = (year, zoomValue = zoomRef.current) => (year - startYear) * zoomValue + PADDING_LEFT;

            const screenXToYear = (clientX, zoomValue = zoomRef.current) => {
                const container = containerRef.current;
                if (!container) return startYear;
                const rect = container.getBoundingClientRect();
                return (container.scrollLeft + clientX - rect.left - PADDING_LEFT) / zoomValue + startYear;
            };

            const commitZoom = (newZoom, targetScrollLeft) => {
                const safeZoom = clampZoom(newZoom);
                const container = containerRef.current;
                if (!container) return;

                zoomRef.current = safeZoom;
                if (Math.abs(safeZoom - zoom) < 0.0001) {
                    container.scrollLeft = Math.max(0, targetScrollLeft);
                    return;
                }

                nextScrollLeft.current = Math.max(0, targetScrollLeft);
                setZoom(safeZoom);
            };

            const zoomAtClientX = (newZoom, clientX) => {
                const container = containerRef.current;
                if (!container) return;
                const rect = container.getBoundingClientRect();
                const viewportOffset = clientX - rect.left;
                const yearAtPoint = screenXToYear(clientX);
                const safeZoom = clampZoom(newZoom);
                commitZoom(safeZoom, yearToX(yearAtPoint, safeZoom) - viewportOffset);
            };

            const handleZoom = (newZoom, centerRatio = 0.5) => {
                const container = containerRef.current;
                if (!container) return;
                const rect = container.getBoundingClientRect();
                zoomAtClientX(newZoom, rect.left + rect.width * centerRatio);
            };

            const panByDelta = (deltaX) => {
                if (containerRef.current) containerRef.current.scrollLeft -= deltaX;
            };

            const focusYear = (year, requestedZoom = zoomRef.current) => {
                const container = containerRef.current;
                if (!container) return;
                const safeZoom = clampZoom(requestedZoom);
                commitZoom(safeZoom, yearToX(year, safeZoom) - container.clientWidth / 2);
            };

            const fitTimeline = () => {
                const container = containerRef.current;
                if (!container) return;
                const fitZoom = clampZoom((container.clientWidth - 74) / totalYears);
                commitZoom(fitZoom, 0);
            };

            const resetView = () => focusYear(1800, 1);
            const jumpToModern = () => focusYear(1950, Math.max(zoomRef.current, 1.15));

            useEffect(() => {
                zoomRef.current = zoom;
            }, [zoom]);

            useEffect(() => {
                const updatePointerMode = () => {
                    setIsTouchDevice(window.matchMedia('(pointer: coarse)').matches || window.innerWidth < 768);
                };
                updatePointerMode();
                const query = window.matchMedia('(pointer: coarse)');
                query.addEventListener?.('change', updatePointerMode);
                window.addEventListener('resize', updatePointerMode);
                return () => {
                    query.removeEventListener?.('change', updatePointerMode);
                    window.removeEventListener('resize', updatePointerMode);
                };
            }, []);

            useEffect(() => {
                const handleKeyDown = (event) => {
                    if (event.key !== 'Escape') return;
                    if (showHelp) setShowHelp(false);
                    else setSelectedItem(null);
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [showHelp]);

            useEffect(() => {
                const applyInitialFocus = () => focusYear(1800, 1);
                applyInitialFocus();
                const retry = window.setTimeout(applyInitialFocus, 60);
                return () => window.clearTimeout(retry);
            }, []);

            useLayoutEffect(() => {
                if (nextScrollLeft.current !== null && containerRef.current) {
                    containerRef.current.scrollLeft = nextScrollLeft.current;
                    nextScrollLeft.current = null;
                }
            }, [zoom, mode]);

            const makeItem = (type, data, x = 0, y = 0) => ({ type, data, x, y, key: itemKey(type, data) });
            const isSelected = (type, data) => selectedItem?.key === itemKey(type, data);

            const selectTimelineItem = (event, type, data) => {
                if (Date.now() < suppressClickUntilRef.current) return;
                event.stopPropagation();
                setSelectedItem(makeItem(type, data));
            };

            const selectItemWithKeyboard = (event, type, data) => {
                if (event.key !== 'Enter' && event.key !== ' ') return;
                event.preventDefault();
                setSelectedItem(makeItem(type, data));
            };

            const showHover = (event, type, data) => {
                if (isTouchDevice || activePointersRef.current.size) return;
                setHoveredItem(makeItem(type, data, event.clientX, event.clientY));
            };

            const getPointerMetrics = () => {
                const points = Array.from(activePointersRef.current.values());
                if (!points.length) return { midpoint: null, distance: 0 };
                if (points.length === 1) return { midpoint: points[0], distance: 0 };
                const first = points[0];
                const second = points[1];
                return {
                    midpoint: { x: (first.x + second.x) / 2, y: (first.y + second.y) / 2 },
                    distance: Math.hypot(second.x - first.x, second.y - first.y)
                };
            };

            const updateMouseCursor = (event) => {
                if (event.pointerType !== 'mouse' || activePointersRef.current.size) return;
                setCursorYear(screenXToYear(event.clientX));
                setMousePos({ x: event.clientX, y: event.clientY });
            };

            const handlePointerDown = (event) => {
                if (event.pointerType === 'mouse' && event.button !== 0) return;
                activePointersRef.current.set(event.pointerId, { x: event.clientX, y: event.clientY });
                const metrics = getPointerMetrics();
                gestureRef.current = { lastMidpoint: metrics.midpoint, lastDistance: metrics.distance, moved: false };
                setIsDragging(true);
            };

            const handlePointerMove = (event) => {
                if (!activePointersRef.current.has(event.pointerId)) {
                    updateMouseCursor(event);
                    return;
                }

                const previous = activePointersRef.current.get(event.pointerId);
                activePointersRef.current.set(event.pointerId, { x: event.clientX, y: event.clientY });
                const metrics = getPointerMetrics();
                const gesture = gestureRef.current;
                const traveled = Math.hypot(event.clientX - previous.x, event.clientY - previous.y);
                if (traveled > 2 && !gesture.moved) {
                    gesture.moved = true;
                    try {
                        event.currentTarget.setPointerCapture?.(event.pointerId);
                    } catch {
                        // Some embedded browsers do not expose capture for synthetic pointers.
                    }
                }

                if (metrics.midpoint && gesture.lastMidpoint) {
                    panByDelta(metrics.midpoint.x - gesture.lastMidpoint.x);
                }

                if (activePointersRef.current.size >= 2 && gesture.lastDistance > 0 && metrics.distance > 0) {
                    const ratio = metrics.distance / gesture.lastDistance;
                    if (Math.abs(ratio - 1) > 0.002) zoomAtClientX(zoomRef.current * ratio, metrics.midpoint.x);
                }

                gesture.lastMidpoint = metrics.midpoint;
                gesture.lastDistance = metrics.distance;

                if (gesture.moved) suppressClickUntilRef.current = Date.now() + 160;
                event.preventDefault();
            };

            const finishPointer = (event, cancelled = false) => {
                const wasSinglePointer = activePointersRef.current.size === 1;
                const gesture = gestureRef.current;
                const targetIsItem = event.target.closest?.('[data-timeline-item="true"]');

                activePointersRef.current.delete(event.pointerId);
                try {
                    event.currentTarget.releasePointerCapture?.(event.pointerId);
                } catch {
                    // Capture may already be released after a cancelled gesture.
                }

                if (activePointersRef.current.size) {
                    const metrics = getPointerMetrics();
                    gestureRef.current = { lastMidpoint: metrics.midpoint, lastDistance: metrics.distance, moved: true };
                    return;
                }

                setIsDragging(false);
                if (gesture.moved) {
                    suppressClickUntilRef.current = Date.now() + 160;
                    return;
                }

                if (!cancelled && wasSinglePointer && !targetIsItem) {
                    const now = Date.now();
                    const lastTap = lastTapRef.current;
                    const isDoubleTap = now - lastTap.time < 320 && Math.hypot(event.clientX - lastTap.x, event.clientY - lastTap.y) < 26;
                    setSelectedItem(null);
                    if (isDoubleTap) {
                        zoomAtClientX(zoomRef.current * 1.45, event.clientX);
                        lastTapRef.current = { time: 0, x: 0, y: 0 };
                    } else {
                        lastTapRef.current = { time: now, x: event.clientX, y: event.clientY };
                    }
                }
            };

            const handleWheel = (event) => {
                if (event.altKey) {
                    event.preventDefault();
                    zoomAtClientX(zoomRef.current * (event.deltaY > 0 ? 0.9 : 1.1), event.clientX);
                    return;
                }

                if (Math.abs(event.deltaY) > Math.abs(event.deltaX)) {
                    event.preventDefault();
                    if (containerRef.current) containerRef.current.scrollLeft += event.deltaY;
                }
            };

            useEffect(() => {
                const container = containerRef.current;
                if (!container) return;
                const wheelListener = (event) => handleWheel(event);
                container.addEventListener('wheel', wheelListener, { passive: false });
                return () => container.removeEventListener('wheel', wheelListener);
            }, []);

            const getTechLabelY = (lane) => layout.techAxisY + 48 + lane * 27;

            const getPolBarY = (lane) => {
                const laneHeight = 31;
                if (layout.polDirection === -1) return layout.polAxisY - 50 - lane * laneHeight;
                return layout.polAxisY + 40 + lane * laneHeight;
            };

            const gridStep = zoom < 0.12 ? 2000 : zoom < 0.45 ? 1000 : zoom < 2 ? 500 : 100;
            const showTechLabels = zoom > 0.17;

            const theme = isDarkMode ? {
                bg: 'bg-slate-950',
                text: 'text-slate-100',
                subText: 'text-slate-400',
                axis: '#cbd5e1',
                grid: '#1e293b',
                gridText: '#64748b'
            } : {
                bg: 'bg-slate-50',
                text: 'text-slate-900',
                subText: 'text-slate-500',
                axis: '#475569',
                grid: '#e2e8f0',
                gridText: '#94a3b8'
            };

            const renderToolbar = (mobile = false) => (
                <div className={`toolbar-shell ${mobile ? 'mobile-toolbar' : 'desktop-toolbar'}`} aria-label="Timeline navigation controls">
                    <ToolbarButton label="Zoom out" onClick={() => handleZoom(zoomRef.current * 0.82)}>
                        <ZoomOut size={18} />
                    </ToolbarButton>
                    <span className={`w-12 text-center font-mono text-[11px] font-bold ${theme.subText}`}>{Math.round(zoom * 100)}%</span>
                    <ToolbarButton label="Zoom in" onClick={() => handleZoom(zoomRef.current * 1.22)}>
                        <ZoomIn size={18} />
                    </ToolbarButton>
                    <div className="toolbar-divider" />
                    <ToolbarButton label="Fit full timeline" onClick={fitTimeline}>
                        <Maximize2 size={17} />
                    </ToolbarButton>
                    <ToolbarButton label="Jump to modern era" onClick={jumpToModern}>
                        <Navigation size={17} />
                    </ToolbarButton>
                    <ToolbarButton label="Reset view" onClick={resetView}>
                        <RefreshCcw size={17} />
                    </ToolbarButton>
                </div>
            );

            return (
                <div className={`flex h-screen flex-col overflow-hidden font-sans transition-colors duration-300 ${theme.bg} ${isDarkMode ? 'dark' : ''}`}>
                    <header className="app-header z-30">
                        <div className="flex min-w-0 items-center gap-3">
                            <div className="atlas-mark"><Sparkles size={19} /></div>
                            <div className="min-w-0">
                                <div className={`brand-title truncate text-sm font-extrabold uppercase tracking-[0.14em] ${theme.text}`}>Civilization Atlas</div>
                                <div className={`brand-subtitle mt-0.5 text-[11px] font-medium ${theme.subText}`}>
                                    {mode === 'tech' && 'Innovation timeline'}
                                    {mode === 'pol' && 'Political evolution'}
                                    {mode === 'merged-overlap' && 'Unified civilization view'}
                                    {mode === 'merged-split' && 'Split civilization view'}
                                </div>
                            </div>
                        </div>

                        <nav className="mode-strip" aria-label="Timeline mode">
                            {MODE_OPTIONS.map((option) => (
                                <ModeButton key={option.id} option={option} mode={mode} onChange={setMode} />
                            ))}
                        </nav>

                        <div className="flex items-center justify-end gap-1">
                            <div className={`desktop-hint mr-1 flex items-center gap-2 text-[11px] font-semibold ${theme.subText}`}>
                                <Hand size={15} />
                                <span>Drag to move</span>
                                <span className="opacity-50">/</span>
                                <span>Alt + scroll to zoom</span>
                            </div>
                            <ToolbarButton label="Open gesture help" onClick={() => setShowHelp(true)}>
                                <HelpCircle size={19} />
                            </ToolbarButton>
                            <ToolbarButton label={isDarkMode ? 'Use light theme' : 'Use dark theme'} onClick={() => setIsDarkMode(!isDarkMode)}>
                                {isDarkMode ? <Sun size={19} /> : <Moon size={19} />}
                            </ToolbarButton>
                            {renderToolbar()}
                        </div>
                    </header>

                    <main
                        ref={containerRef}
                        className={`timeline-canvas relative flex-1 overflow-x-auto overflow-y-hidden ${isDragging ? 'is-dragging' : ''}`}
                        aria-label="Interactive civilization timeline"
                        onPointerDown={handlePointerDown}
                        onPointerMove={handlePointerMove}
                        onPointerUp={(event) => finishPointer(event)}
                        onPointerCancel={(event) => finishPointer(event, true)}
                        onPointerLeave={(event) => {
                            if (event.pointerType === 'mouse' && !activePointersRef.current.size) setCursorYear(null);
                        }}
                    >
                        <div className="pointer-events-none sticky left-0 top-0 z-20 flex h-0 w-screen justify-center">
                            <div className={`mt-3 hidden items-center gap-2 rounded-full border px-3 py-1.5 text-[11px] font-bold shadow-sm backdrop-blur-md md:flex ${isDarkMode ? 'border-slate-700 bg-slate-900/75 text-slate-300' : 'border-slate-200 bg-white/80 text-slate-600'}`}>
                                <Hand size={14} />
                                <span>{isTouchDevice ? 'Drag, pinch, or tap to explore' : 'Drag or scroll to explore the timeline'}</span>
                            </div>
                        </div>

                        <div className="relative" style={{ width: `${canvasWidth}px`, height: `${TIMELINE_HEIGHT}px` }}>
                            <svg width={canvasWidth} height={TIMELINE_HEIGHT} className="absolute left-0 top-0 block">
                                {Array.from({ length: Math.ceil(totalYears / gridStep) + 1 }).map((_, index) => {
                                    const year = startYear + index * gridStep;
                                    if (year > endYear) return null;
                                    const x = yearToX(year, zoom);
                                    return (
                                        <g key={year}>
                                            <line x1={x} y1={0} x2={x} y2={TIMELINE_HEIGHT} stroke={theme.grid} strokeWidth={1} strokeDasharray="4 5" />
                                            <text x={x + 6} y={layout.techAxisY + 17} fontSize={10} fill={theme.gridText} fontFamily="monospace" opacity={0.78}>{formatYear(year)}</text>
                                            {mode === 'merged-split' && (
                                                <text x={x + 6} y={layout.polAxisY - 12} fontSize={10} fill={theme.gridText} fontFamily="monospace" opacity={0.78}>{formatYear(year)}</text>
                                            )}
                                        </g>
                                    );
                                })}

                                {layout.eraSet.map((era) => {
                                    const startX = yearToX(era.start, zoom);
                                    const endX = yearToX(era.end, zoom);
                                    const width = Math.max(endX - startX, 1);
                                    const colorHex = hexColors[era.color];
                                    const ERA_Y = 80;
                                    const selected = isSelected('era', era);

                                    return (
                                        <g key={era.name}>
                                            <rect x={startX} y={ERA_Y} width={width} height={TIMELINE_HEIGHT - ERA_Y} fill={colorHex} fillOpacity={isDarkMode ? 0.12 : 0.25} />
                                            <line x1={endX} y1={0} x2={endX} y2={TIMELINE_HEIGHT} stroke={theme.grid} strokeWidth={1} strokeOpacity={0.65} />
                                            {width > 86 ? (
                                                <foreignObject x={startX} y={ERA_Y + 12} width={width} height={38} style={{ overflow: 'visible' }}>
                                                    <div className="flex justify-center">
                                                        <div
                                                            role="button"
                                                            tabIndex="0"
                                                            data-timeline-item="true"
                                                            aria-label={`Open ${era.name} details`}
                                                            className={`era-chip ${selected ? 'is-selected' : ''}`}
                                                            style={{ backgroundColor: isDarkMode ? `${colorHex}66` : colorHex }}
                                                            onClick={(event) => selectTimelineItem(event, 'era', era)}
                                                            onKeyDown={(event) => selectItemWithKeyboard(event, 'era', era)}
                                                            onMouseEnter={(event) => showHover(event, 'era', era)}
                                                            onMouseLeave={() => setHoveredItem(null)}
                                                        >
                                                            {era.name}
                                                        </div>
                                                    </div>
                                                </foreignObject>
                                            ) : (
                                                <text
                                                    data-timeline-item="true"
                                                    role="button"
                                                    tabIndex="0"
                                                    aria-label={`Open ${era.name} details`}
                                                    transform={`translate(${startX + width / 2}, ${ERA_Y - 5}) rotate(-48)`}
                                                    textAnchor="start"
                                                    fontSize={10}
                                                    fontWeight="800"
                                                    fill={selected ? '#2563eb' : (isDarkMode ? '#cbd5e1' : '#475569')}
                                                    className="cursor-pointer uppercase tracking-wider"
                                                    onClick={(event) => selectTimelineItem(event, 'era', era)}
                                                    onKeyDown={(event) => selectItemWithKeyboard(event, 'era', era)}
                                                    onMouseEnter={(event) => showHover(event, 'era', era)}
                                                    onMouseLeave={() => setHoveredItem(null)}
                                                >
                                                    {era.name}
                                                </text>
                                            )}
                                        </g>
                                    );
                                })}

                                {layout.showPol && (
                                    <g>
                                        <line x1={PADDING_LEFT} y1={layout.polAxisY} x2={yearToX(endYear, zoom)} y2={layout.polAxisY} stroke={theme.axis} strokeWidth={2} />
                                        {mode.includes('merged') && (
                                            <text x={PADDING_LEFT} y={layout.polAxisY - 12} fill={theme.axis} fontWeight="800" fontSize={11} letterSpacing="1.4">POLITICS</text>
                                        )}
                                        {layoutPolData.map((system, index) => {
                                            const startX = yearToX(system.start, zoom);
                                            const endX = yearToX(system.end, zoom);
                                            const width = Math.max(endX - startX, 3);
                                            const y = getPolBarY(system.lane);
                                            const color = polColors[system.type] || '#64748b';
                                            const selected = isSelected('pol', system);
                                            return (
                                                <g
                                                    key={`${system.name}-${index}`}
                                                    data-timeline-item="true"
                                                    role="button"
                                                    tabIndex="0"
                                                    aria-label={`Open ${system.name} details`}
                                                    className="cursor-pointer"
                                                    onClick={(event) => selectTimelineItem(event, 'pol', system)}
                                                    onKeyDown={(event) => selectItemWithKeyboard(event, 'pol', system)}
                                                    onMouseEnter={(event) => showHover(event, 'pol', system)}
                                                    onMouseLeave={() => setHoveredItem(null)}
                                                >
                                                    <rect x={startX} y={y} width={width} height={25} rx={7} fill={color} fillOpacity={selected ? 0.44 : (isDarkMode ? 0.28 : 0.2)} stroke={color} strokeWidth={selected ? 3 : 1.4} />
                                                    <line x1={startX} y1={layout.polDirection === -1 ? y + 25 : y} x2={startX} y2={layout.polAxisY} stroke={color} strokeWidth={1} strokeDasharray="2 3" opacity={0.38} />
                                                    <foreignObject x={startX} y={y} width={width} height={25} style={{ pointerEvents: 'none' }}>
                                                        <div className={`flex h-full w-full items-center justify-center gap-1 overflow-hidden px-1 ${isDarkMode ? 'text-slate-100' : 'text-slate-800'}`}>
                                                            <TimelineGlyph kind={getPoliticalGlyph(system.type)} size={13} className="shrink-0" />
                                                            {width > 74 && <span className="truncate text-[11px] font-bold">{system.name}</span>}
                                                        </div>
                                                    </foreignObject>
                                                </g>
                                            );
                                        })}
                                    </g>
                                )}

                                {layout.showTech && (
                                    <g>
                                        <line x1={PADDING_LEFT} y1={layout.techAxisY} x2={yearToX(endYear, zoom)} y2={layout.techAxisY} stroke={theme.axis} strokeWidth={2} />
                                        {mode.includes('merged') && (
                                            <text x={PADDING_LEFT} y={layout.techAxisY + 24} fill={theme.axis} fontWeight="800" fontSize={11} letterSpacing="1.4">TECHNOLOGY</text>
                                        )}
                                        {layoutTechData.map((invention, index) => {
                                            const x = yearToX(invention.year, zoom);
                                            const yEnd = getTechLabelY(invention.lane);
                                            const selected = isSelected('tech', invention);
                                            return (
                                                <g
                                                    key={`${invention.name}-${index}`}
                                                    data-timeline-item="true"
                                                    role="button"
                                                    tabIndex="0"
                                                    aria-label={`Open ${invention.name} details`}
                                                    className="cursor-pointer"
                                                    onClick={(event) => selectTimelineItem(event, 'tech', invention)}
                                                    onKeyDown={(event) => selectItemWithKeyboard(event, 'tech', invention)}
                                                    onMouseEnter={(event) => showHover(event, 'tech', invention)}
                                                    onMouseLeave={() => setHoveredItem(null)}
                                                >
                                                    <path d={`M ${x} ${layout.techAxisY} L ${x} ${yEnd}`} stroke={selected ? '#2563eb' : theme.gridText} strokeWidth={selected ? 2 : 1} opacity={selected ? 0.95 : 0.7} />
                                                    <circle cx={x} cy={layout.techAxisY} r={selected ? 5 : 3.5} fill={selected ? '#2563eb' : theme.axis} />
                                                    {showTechLabels ? (
                                                        <foreignObject x={x - 85} y={yEnd} width={170} height={58} style={{ overflow: 'visible' }}>
                                                            <div className="flex flex-col items-center text-center">
                                                                <div className={`timeline-label flex items-center gap-1.5 whitespace-nowrap px-2 py-1 text-[11px] font-bold ${theme.text} ${selected ? 'is-selected' : ''}`}>
                                                                    <TimelineGlyph kind={getTechGlyph(invention.name)} size={13} className="shrink-0 text-blue-500" />
                                                                    <span>{invention.name}</span>
                                                                </div>
                                                                {zoom > 0.48 && <div className={`mt-0.5 rounded px-1 font-mono text-[9px] ${theme.subText}`}>{formatYear(invention.year)}</div>}
                                                            </div>
                                                        </foreignObject>
                                                    ) : (
                                                        <circle cx={x} cy={yEnd} r={selected ? 5 : 4} fill={selected ? '#2563eb' : theme.gridText} opacity={0.82} />
                                                    )}
                                                </g>
                                            );
                                        })}
                                    </g>
                                )}
                            </svg>
                        </div>
                    </main>

                    {!isTouchDevice && cursorYear !== null && !isDragging && (
                        <div className="pointer-events-none fixed z-50 -translate-x-1/2 -translate-y-full rounded-full bg-blue-600 px-2 py-1 text-[11px] font-bold text-white shadow-md" style={{ left: mousePos.x, top: mousePos.y - 10 }}>
                            {formatYear(cursorYear)}
                        </div>
                    )}

                    {!isTouchDevice && hoveredItem && !selectedItem && (
                        <div className={`pointer-events-none fixed z-50 w-72 -translate-x-1/2 -translate-y-full rounded-2xl border p-4 shadow-2xl backdrop-blur-md ${isDarkMode ? 'border-slate-600 bg-slate-800/95 text-slate-100' : 'border-slate-200 bg-white/95 text-slate-800'}`} style={{ left: hoveredItem.x, top: hoveredItem.y - 12 }}>
                            <DetailContent item={hoveredItem} />
                        </div>
                    )}

                    {selectedItem && (
                        <aside className="detail-sheet" role="dialog" aria-label={`${selectedItem.data.name} details`}>
                            <button type="button" className="icon-button absolute right-2 top-2" aria-label="Close details" title="Close details" onClick={() => setSelectedItem(null)}>
                                <X size={18} />
                            </button>
                            <div className="pr-8"><DetailContent item={selectedItem} /></div>
                        </aside>
                    )}

                    {!selectedItem && renderToolbar(true)}

                    {showHelp && (
                        <div className="help-backdrop" role="presentation" onClick={(event) => { if (event.target === event.currentTarget) setShowHelp(false); }}>
                            <section className="help-panel" role="dialog" aria-modal="true" aria-labelledby="gesture-help-title">
                                <div className="flex items-start justify-between gap-4">
                                    <div>
                                        <div className="text-[10px] font-extrabold uppercase tracking-[0.2em] text-blue-500">Timeline guide</div>
                                        <h2 id="gesture-help-title" className="mt-1 text-2xl font-extrabold tracking-tight">Explore like a map</h2>
                                    </div>
                                    <button type="button" className="icon-button -mr-2 -mt-2" aria-label="Close help" title="Close help" onClick={() => setShowHelp(false)}>
                                        <X size={19} />
                                    </button>
                                </div>
                                <div className="mt-5 grid gap-5 md:grid-cols-2">
                                    <div>
                                        <h3 className="text-sm font-extrabold text-slate-900 dark:text-white">Desktop</h3>
                                        <ul className="mt-2 space-y-2 text-sm leading-5 text-slate-600 dark:text-slate-300">
                                            <li>Hover for a quick preview.</li>
                                            <li>Click an item to pin its details.</li>
                                            <li>Drag or scroll to move through time.</li>
                                            <li>Hold Alt while scrolling to zoom.</li>
                                        </ul>
                                    </div>
                                    <div>
                                        <h3 className="text-sm font-extrabold text-slate-900 dark:text-white">Touch</h3>
                                        <ul className="mt-2 space-y-2 text-sm leading-5 text-slate-600 dark:text-slate-300">
                                            <li>Drag with one finger to pan.</li>
                                            <li>Pinch or drag with two fingers to zoom and move.</li>
                                            <li>Tap an item for a detail sheet.</li>
                                            <li>Double tap empty space to zoom in.</li>
                                        </ul>
                                    </div>
                                </div>
                            </section>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<TimelineApp />);
    </script>
</body>

</html>
