<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilization Timeline</title>
    <link rel="icon" href="data:,">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="./data/timelineData.js"></script>

    <style>
        :root {
            color-scheme: light;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --visual-viewport-height: 100vh;
        }

        html,
        body,
        #root {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            overscroll-behavior: none;
            background: #f8fafc;
        }

        .app-shell {
            height: 100vh;
            height: 100svh;
            height: 100dvh;
            min-height: 100vh;
            min-height: 100svh;
        }

        button {
            -webkit-tap-highlight-color: transparent;
        }

        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        .dark ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .app-header {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 18px;
            padding: max(12px, var(--safe-top)) max(16px, var(--safe-right)) 12px max(16px, var(--safe-left));
            border-bottom: 1px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
            backdrop-filter: blur(18px);
        }

        .dark .app-header {
            border-color: #334155;
            background: rgba(15, 23, 42, 0.92);
            box-shadow: 0 8px 24px rgba(2, 6, 23, 0.25);
        }

        .atlas-mark {
            display: grid;
            width: 36px;
            height: 36px;
            place-items: center;
            border-radius: 12px;
            color: #2563eb;
            background: linear-gradient(135deg, #dbeafe, #e0e7ff);
            box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.12);
        }

        .dark .atlas-mark {
            color: #93c5fd;
            background: linear-gradient(135deg, rgba(30, 64, 175, 0.5), rgba(67, 56, 202, 0.45));
            box-shadow: inset 0 0 0 1px rgba(147, 197, 253, 0.2);
        }

        .mode-strip {
            display: flex;
            justify-self: center;
            padding: 4px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            background: #f1f5f9;
        }

        .dark .mode-strip {
            border-color: #334155;
            background: #0f172a;
        }

        .mode-button {
            display: flex;
            min-height: 38px;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 0 12px;
            border-radius: 10px;
            color: #64748b;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: -0.01em;
            transition: color 160ms ease, background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
        }

        .mode-button:hover {
            color: #0f172a;
            transform: translateY(-1px);
        }

        .mode-button.is-active {
            color: #0f172a;
            background: #ffffff;
            box-shadow: 0 3px 10px rgba(15, 23, 42, 0.1);
        }

        .dark .mode-button {
            color: #94a3b8;
        }

        .dark .mode-button:hover,
        .dark .mode-button.is-active {
            color: #f8fafc;
        }

        .dark .mode-button.is-active {
            background: #1e293b;
            box-shadow: 0 3px 12px rgba(2, 6, 23, 0.35);
        }

        .icon-button {
            display: inline-grid;
            min-width: 40px;
            min-height: 40px;
            place-items: center;
            border-radius: 10px;
            color: #64748b;
            transition: color 160ms ease, background 160ms ease, transform 160ms ease;
        }

        .icon-button:hover {
            color: #0f172a;
            background: #f1f5f9;
            transform: translateY(-1px);
        }

        .dark .icon-button {
            color: #94a3b8;
        }

        .dark .icon-button:hover {
            color: #f8fafc;
            background: #334155;
        }

        .toolbar-shell {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 3px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(16px);
        }

        .dark .toolbar-shell {
            border-color: #334155;
            background: rgba(30, 41, 59, 0.92);
            box-shadow: 0 8px 20px rgba(2, 6, 23, 0.26);
        }

        .toolbar-divider {
            width: 1px;
            height: 22px;
            margin: 0 3px;
            background: #e2e8f0;
        }

        .dark .toolbar-divider {
            background: #475569;
        }

        .timeline-canvas {
            touch-action: none;
            overscroll-behavior: contain;
            cursor: grab;
            scrollbar-gutter: stable;
        }

        .timeline-canvas.is-dragging {
            cursor: grabbing;
        }

        svg [role="button"] {
            outline: none;
        }

        svg [role="button"]:focus-visible {
            filter: drop-shadow(0 0 4px rgba(37, 99, 235, 0.7));
        }

        .era-chip:focus-visible {
            outline: 2px solid #2563eb;
            outline-offset: 3px;
        }

        .era-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 26px;
            padding: 4px 11px;
            border: 1px solid rgba(15, 23, 42, 0.1);
            border-radius: 999px;
            color: #1e293b;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            line-height: 1;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.1);
            cursor: pointer;
            transition: transform 160ms ease, box-shadow 160ms ease;
        }

        .era-chip:hover,
        .era-chip.is-selected {
            transform: translateY(-2px);
            box-shadow: 0 7px 14px rgba(15, 23, 42, 0.16);
        }

        .dark .era-chip {
            color: #f8fafc;
            border-color: rgba(248, 250, 252, 0.16);
        }

        .timeline-label {
            border: 1px solid rgba(148, 163, 184, 0.34);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 3px 9px rgba(15, 23, 42, 0.07);
            transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
        }

        .timeline-label:hover,
        .timeline-label.is-selected {
            border-color: rgba(37, 99, 235, 0.55);
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.16);
            transform: translateY(-2px);
        }

        .dark .timeline-label {
            border-color: rgba(100, 116, 139, 0.7);
            background: rgba(30, 41, 59, 0.94);
        }

        .detail-sheet {
            position: fixed;
            right: max(18px, var(--safe-right));
            bottom: max(18px, var(--safe-bottom));
            z-index: 70;
            width: min(360px, calc(100vw - 32px));
            padding: 18px;
            border: 1px solid rgba(203, 213, 225, 0.9);
            border-radius: 18px;
            color: #1e293b;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 22px 48px rgba(15, 23, 42, 0.22);
            backdrop-filter: blur(18px);
        }

        .dark .detail-sheet {
            border-color: rgba(71, 85, 105, 0.9);
            color: #f1f5f9;
            background: rgba(30, 41, 59, 0.97);
            box-shadow: 0 22px 48px rgba(2, 6, 23, 0.5);
        }

        .help-backdrop {
            position: fixed;
            inset: 0;
            z-index: 90;
            display: grid;
            place-items: center;
            padding: 18px;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(7px);
        }

        .help-panel {
            width: min(640px, 100%);
            max-height: min(820px, calc(var(--visual-viewport-height) - var(--safe-top) - var(--safe-bottom) - 36px));
            overflow: auto;
            padding: 22px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            color: #1e293b;
            background: rgba(255, 255, 255, 0.99);
            box-shadow: 0 24px 64px rgba(15, 23, 42, 0.28);
        }

        .dark .help-panel {
            border-color: #475569;
            color: #f1f5f9;
            background: #1e293b;
        }

        .dark .help-panel p,
        .dark .help-panel li,
        .dark .guide-card p {
            color: #cbd5e1;
        }

        .dark .guide-card h3 {
            color: #f8fafc;
        }

        .utility-backdrop {
            position: fixed;
            inset: 0;
            z-index: 85;
            display: grid;
            place-items: center;
            padding: 18px;
            background: rgba(15, 23, 42, 0.38);
            backdrop-filter: blur(6px);
        }

        .utility-panel {
            width: min(680px, 100%);
            max-height: min(760px, calc(var(--visual-viewport-height) - var(--safe-top) - var(--safe-bottom) - 36px));
            overflow: auto;
            padding: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            color: #1e293b;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 24px 64px rgba(15, 23, 42, 0.25);
        }

        .dark .utility-panel {
            border-color: #475569;
            color: #f1f5f9;
            background: rgba(30, 41, 59, 0.98);
        }

        .utility-input {
            width: 100%;
            min-height: 44px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 0 13px;
            color: #0f172a;
            background: #ffffff;
            font-size: 14px;
            outline: none;
            transition: border-color 160ms ease, box-shadow 160ms ease;
        }

        .utility-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.16);
        }

        .dark .utility-input {
            border-color: #475569;
            color: #f8fafc;
            background: #0f172a;
        }

        .result-row {
            display: flex;
            width: 100%;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 12px;
            text-align: left;
            transition: background 160ms ease, transform 160ms ease;
        }

        .result-row:hover,
        .result-row:focus-visible {
            background: #f1f5f9;
            outline: none;
            transform: translateX(2px);
        }

        .hover-preview {
            position: fixed;
            z-index: 80;
            width: min(304px, calc(100vw - var(--safe-left) - var(--safe-right) - 24px));
            max-height: min(480px, calc(var(--visual-viewport-height) - var(--safe-top) - var(--safe-bottom) - 24px));
            overflow: auto;
            padding: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            color: #1e293b;
            background: rgba(255, 255, 255, 0.99);
            box-shadow: 0 20px 44px rgba(15, 23, 42, 0.22);
        }

        .dark .hover-preview {
            border-color: #475569;
            color: #f1f5f9;
            background: rgba(30, 41, 59, 0.99);
            box-shadow: 0 20px 44px rgba(2, 6, 23, 0.5);
        }

        .dark .result-row:hover,
        .dark .result-row:focus-visible {
            background: #334155;
        }

        .filter-chip {
            display: inline-flex;
            min-height: 34px;
            align-items: center;
            gap: 6px;
            padding: 0 10px;
            border: 1px solid #cbd5e1;
            border-radius: 999px;
            color: #475569;
            background: #ffffff;
            font-size: 11px;
            font-weight: 800;
            transition: opacity 160ms ease, border-color 160ms ease, background 160ms ease;
        }

        .filter-chip.is-off {
            opacity: 0.42;
            background: #f1f5f9;
        }

        .dark .filter-chip {
            border-color: #475569;
            color: #cbd5e1;
            background: #1e293b;
        }

        .dark .filter-chip.is-off {
            background: #0f172a;
        }

        .orientation-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px;
            border: 1px solid #dbeafe;
            border-radius: 999px;
            color: #2563eb;
            background: #eff6ff;
            font-size: 11px;
            font-weight: 800;
        }

        .dark .orientation-pill {
            border-color: rgba(96, 165, 250, 0.35);
            color: #93c5fd;
            background: rgba(30, 64, 175, 0.24);
        }

        .minimap {
            position: fixed;
            z-index: 55;
            border: 1px solid rgba(148, 163, 184, 0.48);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.84);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.12);
            backdrop-filter: blur(12px);
        }

        .dark .minimap {
            border-color: rgba(71, 85, 105, 0.9);
            background: rgba(15, 23, 42, 0.82);
        }

        .minimap-horizontal {
            right: max(24px, var(--safe-right));
            bottom: max(16px, var(--safe-bottom));
            left: max(24px, var(--safe-left));
            height: 16px;
        }

        .minimap-vertical {
            top: calc(92px + var(--safe-top));
            right: max(12px, var(--safe-right));
            bottom: max(20px, var(--safe-bottom));
            width: 18px;
        }

        .minimap-track {
            position: absolute;
            inset: 3px;
            overflow: hidden;
            border-radius: inherit;
            cursor: pointer;
        }

        .minimap-era {
            position: absolute;
            border-radius: 999px;
            opacity: 0.82;
        }

        .minimap-window {
            position: absolute;
            min-width: 10px;
            min-height: 10px;
            border: 2px solid #2563eb;
            border-radius: 999px;
            background: rgba(59, 130, 246, 0.24);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.65);
        }

        .dark .minimap-window {
            border-color: #93c5fd;
            background: rgba(96, 165, 250, 0.32);
            box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.65);
        }

        .vertical-card {
            display: flex;
            min-height: 28px;
            align-items: center;
            gap: 6px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.38);
            border-radius: 9px;
            padding: 4px 7px;
            color: #1e293b;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
            font-size: 10px;
            font-weight: 800;
            white-space: nowrap;
        }

        .vertical-card.is-compact {
            min-height: 24px;
            gap: 4px;
            padding: 3px 6px;
            font-size: 9px;
        }

        .vertical-card.is-selected {
            border-color: #2563eb;
            box-shadow: 0 7px 16px rgba(37, 99, 235, 0.2);
        }

        .dark .vertical-card {
            border-color: rgba(100, 116, 139, 0.8);
            color: #f1f5f9;
            background: rgba(30, 41, 59, 0.96);
        }

        .adaptive-label {
            display: flex;
            align-items: center;
            gap: 5px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.5);
            border-radius: 9px;
            color: #1e293b;
            background: rgba(255, 255, 255, 0.97);
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.09);
            font-weight: 800;
            white-space: nowrap;
        }

        .adaptive-label.is-full {
            min-height: 27px;
            padding: 5px 8px;
            font-size: 10px;
        }

        .adaptive-label.is-compact {
            min-height: 23px;
            padding: 3px 6px;
            font-size: 9px;
        }

        .adaptive-label.is-selected {
            border-color: #2563eb;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
        }

        .dark .adaptive-label {
            border-color: rgba(100, 116, 139, 0.86);
            color: #f1f5f9;
            background: rgba(30, 41, 59, 0.97);
        }

        .cluster-badge {
            display: inline-flex;
            min-width: 38px;
            min-height: 30px;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 4px 8px;
            border: 1px solid rgba(37, 99, 235, 0.52);
            border-radius: 999px;
            color: #1d4ed8;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 7px 17px rgba(37, 99, 235, 0.2);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.02em;
            cursor: pointer;
        }

        .cluster-badge:hover,
        .cluster-badge:focus-visible {
            border-color: #1d4ed8;
            outline: 2px solid rgba(59, 130, 246, 0.32);
            outline-offset: 2px;
            transform: translateY(-1px);
        }

        .cluster-badge.is-politics {
            border-color: rgba(124, 58, 237, 0.56);
            color: #6d28d9;
            box-shadow: 0 7px 17px rgba(124, 58, 237, 0.18);
        }

        .cluster-visual {
            display: flex;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            overflow: hidden;
            border: 1px solid rgba(37, 99, 235, 0.46);
            border-radius: 13px;
            padding: 6px 8px;
            color: #1e3a8a;
            background: rgba(255, 255, 255, 0.97);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.18);
            cursor: pointer;
        }

        .cluster-visual.is-politics {
            border-color: rgba(124, 58, 237, 0.48);
            color: #5b21b6;
            box-shadow: 0 8px 18px rgba(124, 58, 237, 0.17);
        }

        .cluster-visual.is-hovered {
            border-color: #2563eb;
            box-shadow: 0 12px 22px rgba(37, 99, 235, 0.28);
        }

        .cluster-visual.is-politics.is-hovered {
            border-color: #7c3aed;
            box-shadow: 0 12px 22px rgba(124, 58, 237, 0.26);
        }

        .cluster-visual.is-constellation,
        .cluster-visual.is-ultra {
            align-items: center;
            border-radius: 999px;
            padding: 4px 6px;
        }

        .cluster-visual-header {
            display: flex;
            min-width: 0;
            align-items: center;
            gap: 5px;
        }

        .cluster-count {
            display: inline-flex;
            min-width: 29px;
            min-height: 20px;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            padding: 0 6px;
            color: #ffffff;
            background: #2563eb;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.02em;
        }

        .cluster-visual.is-politics .cluster-count {
            background: #7c3aed;
        }

        .cluster-representatives {
            display: flex;
            min-width: 0;
            align-items: center;
            gap: 4px;
        }

        .cluster-representative-label {
            min-width: 0;
            overflow: hidden;
            color: #1e293b;
            font-size: 9px;
            font-weight: 900;
            line-height: 1.12;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .cluster-color-rug {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .cluster-color-rug span {
            width: 6px;
            height: 6px;
            border-radius: 999px;
            box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.08);
        }

        .dark .cluster-badge {
            border-color: rgba(147, 197, 253, 0.72);
            color: #dbeafe;
            background: rgba(30, 41, 59, 0.99);
        }

        .dark .cluster-badge.is-politics {
            border-color: rgba(196, 181, 253, 0.76);
            color: #ede9fe;
        }

        .dark .cluster-visual {
            border-color: rgba(147, 197, 253, 0.62);
            color: #dbeafe;
            background: rgba(30, 41, 59, 0.98);
        }

        .dark .cluster-visual.is-politics {
            border-color: rgba(196, 181, 253, 0.66);
            color: #ede9fe;
        }

        .dark .cluster-representative-label {
            color: #f8fafc;
        }

        .density-dot {
            filter: drop-shadow(0 2px 3px rgba(15, 23, 42, 0.2));
        }

        .timeline-icon {
            display: inline-grid;
            flex: none;
            overflow: hidden;
            place-items: center;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.54);
        }

        .timeline-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .dark .timeline-icon {
            background: rgba(15, 23, 42, 0.42);
        }

        .guide-card {
            padding: 13px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            color: #334155;
            background: #f8fafc;
        }

        .dark .guide-card {
            border-color: #475569;
            color: #cbd5e1;
            background: #0f172a;
        }

        .density-option {
            min-height: 38px;
        }

        .vertical-ribbon-label {
            display: flex;
            height: 100%;
            align-items: center;
            gap: 5px;
            overflow: hidden;
            padding: 5px 3px;
            font-size: 10px;
            font-weight: 800;
            line-height: 1;
            writing-mode: vertical-rl;
        }

        .tag {
            display: inline-flex;
            min-height: 22px;
            align-items: center;
            border-radius: 999px;
            padding: 0 8px;
            color: #475569;
            background: #f1f5f9;
            font-size: 10px;
            font-weight: 800;
        }

        .dark .tag {
            color: #cbd5e1;
            background: #334155;
        }

        .mobile-toolbar {

        const getDensityProfile = ({ orientation, mode, zoom, viewportProfile, labelDensity }) => {
            const preference = DENSITY_OPTIONS[labelDensity] || DENSITY_OPTIONS.balanced;
            const isVertical = orientation === 'vertical';
            const isMerged = mode.includes('merged');
            const small = viewportProfile.width < 768;
            const laneBase = isVertical
                ? (small ? 2 : isMerged ? 5 : 7)
                : (small ? 6 : isMerged ? 10 : 14);
            return {
                orientation,
                mode,
                zoom,
                labelDensity,
                isVertical,
                isMerged,
                isSmallViewport: small,
                clusterGap: (isVertical ? (small ? 38 : 34) : 46) * preference.clusterScale,
                clusterMaxSpan: (isVertical ? (small ? 2.1 : 2.35) : 3.1) * (isVertical ? (small ? 38 : 34) : 46) * preference.clusterScale,
                clusterMinimum: labelDensity === 'dense' ? 4 : 3,
                compactSpacing: (isVertical ? 25 : 104) * (1 - preference.overlap),
                fullSpacing: (isVertical ? 31 : 164) * (1 - preference.overlap),
                glyphSpacing: isVertical ? 12 : 18,
                laneCount: Math.max(2, Math.round(laneBase * preference.laneScale)),
                representatives: preference.representatives,
                pipCount: labelDensity === 'dense' ? 15 : labelDensity === 'clean' ? 9 : 12,
                fullZoom: isVertical ? (small ? 1.28 : 0.86) : 1.4,
                compactZoom: isVertical ? (small ? 0.56 : 0.34) : 0.34,
                glyphZoom: isVertical ? 0.11 : 0.11
            };
        };

        const getItemPriority = (item, selectedKey = '', hoveredKey = '') => {
            const key = item.key || itemKey(getItemKind(item), unwrapItem(item));
            return (key === selectedKey ? 100 : 0) + (key === hoveredKey ? 40 : 0) + getItemImportance(item) * 8;
        };

        const getLabelLOD = (item, densityProfile, localDensity = 1, priority = 0) => {
            if (priority >= 90) return 'full';
            if (densityProfile.zoom < densityProfile.glyphZoom || localDensity >= 6) return 'glyph';
            if (densityProfile.zoom >= densityProfile.fullZoom && localDensity <= 2) return 'full';
            if (densityProfile.zoom >= densityProfile.compactZoom && localDensity <= 4) return 'compact';
            return 'glyph';
        };

        const clusterNearbyItems = ({ items, densityProfile, getPrimaryCoord, selectedKey = '', hoveredKey = '', clusterKind = 'tech' }) => {
            const entries = items.map((item) => {
                const type = clusterKind === 'politics' ? 'pol' : 'tech';
                return {
                    item,
                    key: itemKey(type, item),
                    primary: getPrimaryCoord(item),
                    priority: getItemPriority({ type, data: item }, selectedKey, hoveredKey)
                };
            }).sort((a, b) => a.primary - b.primary);
            const groups = [];
            entries.forEach((entry) => {
                const previous = groups[groups.length - 1];
                if (previous && !previous.entries.some((candidate) => candidate.priority >= 90) && entry.primary - previous.lastPrimary <= densityProfile.clusterGap && entry.primary - previous.entries[0].primary <= densityProfile.clusterMaxSpan && entry.priority < 90) {
                    previous.entries.push(entry);
                    previous.lastPrimary = entry.primary;
                } else {
                    groups.push({ entries: [entry], lastPrimary: entry.primary });
                }
            });
            const clusters = [];
            const loose = [];
            groups.forEach((group, groupIndex) => {
                if (group.entries.length >= densityProfile.clusterMinimum) {
                    const sorted = [...group.entries].sort((a, b) => b.priority - a.priority);
                    const years = group.entries.map((entry) => getItemDisplayYear(entry.item));
                    clusters.push({
                        id: `${clusterKind}-cluster-${groupIndex}-${Math.round(group.entries[0].primary)}`,
                        kind: clusterKind,
                        items: sorted.map((entry) => entry.item),
                        primary: group.entries.reduce((sum, entry) => sum + entry.primary, 0) / group.entries.length,
                        startYear: Math.min(...years),
                        endYear: Math.max(...years),
                        representatives: selectClusterRepresentatives(sorted, Math.min(4, densityProfile.representatives + 1))
                    });
                } else {
                    loose.push(...group.entries);
                }
            });
            return { clusters, loose };
        };

        const layoutTimelineLabels = ({ items, orientation, mode, densityProfile, getPrimaryCoord, selectedKey = '', hoveredKey = '', kind = 'tech' }) => {
            const clustered = clusterNearbyItems({ items, densityProfile, getPrimaryCoord, selectedKey, hoveredKey, clusterKind: kind });
            const laneEnds = Array.from({ length: densityProfile.laneCount }, () => -Infinity);
            const labels = clustered.loose.map((entry) => {
                const nearby = clustered.loose.filter((candidate) => Math.abs(candidate.primary - entry.primary) < densityProfile.clusterGap * 1.3).length;
                const lod = getLabelLOD(entry.item, densityProfile, nearby, entry.priority);
                const spacing = lod === 'full' ? densityProfile.fullSpacing : lod === 'compact' ? densityProfile.compactSpacing : densityProfile.glyphSpacing;
                let lane = laneEnds.findIndex((end) => entry.primary - end >= spacing);
                if (lane === -1) lane = laneEnds.indexOf(Math.min(...laneEnds));
                const labelPrimary = orientation === 'vertical' ? Math.max(entry.primary - spacing / 2, laneEnds[lane] + spacing) : entry.primary;
                laneEnds[lane] = orientation === 'vertical' ? labelPrimary : entry.primary;
                return { ...entry.item, key: entry.key, primary: entry.primary, labelPrimary, lane, lod };
            });
            return { labels, clusters: clustered.clusters };
        };

        const getFloatingPanelPosition = ({ anchorX, anchorY, panelWidth, panelHeight, viewportWidth, viewportHeight, safeArea, preferredPlacement = 'above' }) => {
            const gap = 14;
            const inset = 10;
            const minX = (safeArea.left || 0) + inset;
            const maxX = viewportWidth - (safeArea.right || 0) - panelWidth - inset;
            const minY = (safeArea.top || 0) + inset;
            const maxY = viewportHeight - (safeArea.bottom || 0) - panelHeight - inset;
            const aboveY = anchorY - panelHeight - gap;
            const belowY = anchorY + gap;
            const useAbove = preferredPlacement === 'above' && aboveY >= minY;
            const proposedY = useAbove ? aboveY : belowY;
            return {
                left: Math.max(minX, Math.min(maxX, anchorX - panelWidth / 2)),
                top: Math.max(minY, Math.min(maxY, proposedY))
            };
        };

        const ToolbarButton = ({ label, children, onClick }) => (
            <button type="button" className="icon-button" aria-label={label} title={label} onClick={onClick}>
                {children}
            </button>
        );

        const ModeButton = ({ option, mode, onChange }) => {
            const Icon = option.icon;
            const active = mode === option.id;
            return (
                <button
                    type="button"
                    className={`mode-button ${active ? 'is-active' : ''}`}
                    aria-pressed={active}
                    onClick={() => onChange(option.id)}
                >
                    <Icon size={16} />
                    <span>{option.label}</span>
                </button>
            );
        };

        const DetailContent = ({ item, onRelated }) => (
            <>
                <div className="flex items-center gap-2 text-[10px] font-extrabold uppercase tracking-[0.18em] text-slate-400">
                    <TimelineIcon item={item} size={22} />
                    <span>{getItemCategory(item)}</span>
                </div>
                <h3 className="mt-2 text-xl font-extrabold tracking-tight">{item.data.name}</h3>
                <div className="mt-1 font-mono text-xs text-slate-500 dark:text-slate-400">{getItemDate(item)}</div>
                <p className="mt-3 text-sm leading-6 text-slate-600 dark:text-slate-300">{getItemDescription(item)}</p>
                <div className="mt-3 flex flex-wrap gap-x-3 gap-y-1 text-[10px] font-bold uppercase tracking-[0.08em] text-slate-400">
                    {unwrapItem(item).type && <span>{unwrapItem(item).type}</span>}
                    {unwrapItem(item).region && <span>{unwrapItem(item).region}</span>}
                    <span>{unwrapItem(item).confidence || 'high'} confidence</span>
                    <span>importance {getItemImportance(item)}/5</span>
                </div>
                {item.data.impact?.length > 0 && (
                    <div className="mt-3 flex flex-wrap gap-1.5">
                        {item.data.impact.map((tag) => <span className="tag" key={tag}>{tag}</span>)}
                    </div>
                )}
                {item.data.related?.length > 0 && (
                    <div className="mt-4 border-t border-slate-200 pt-3 dark:border-slate-700">
                        <div className="text-[10px] font-extrabold uppercase tracking-[0.18em] text-slate-400">Related</div>
                        <div className="mt-2 flex flex-wrap gap-1.5">
                            {item.data.related.map((name) => (
                                <button type="button" className="tag hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/50 dark:hover:text-blue-200" key={name} onClick={() => onRelated?.(name)}>
                                    {name}
                                </button>
                            ))}
                        </div>
                    </div>
                )}
            </>
        );

        const getClusterRangeLabel = (cluster) => {
            const start = Math.round(cluster.startYear ?? Math.min(...cluster.items.map(getItemDisplayYear)));
            const end = Math.round(cluster.endYear ?? Math.max(...cluster.items.map(getItemDisplayYear)));
            return start === end ? `around ${formatYear(start)}` : `${formatYear(start)} to ${formatYear(end)}`;
        };

        const ClusterVisual = ({ cluster, visualState, isHovered = false }) => {
            const type = cluster.kind === 'politics' ? 'pol' : 'tech';
            const iconLimit = visualState === 'rich' ? 4 : visualState === 'compact' ? 2 : 1;
            const labelLimit = visualState === 'rich' ? 2 : visualState === 'compact' ? 1 : 0;
            const pipLimit = visualState === 'rich' ? 10 : visualState === 'compact' ? 8 : 5;
            return (
                <div className={`cluster-visual is-${visualState} ${cluster.kind === 'politics' ? 'is-politics' : ''} ${isHovered ? 'is-hovered' : ''}`}>
                    <div className="cluster-visual-header">
                        <span className="cluster-count">+{cluster.items.length}</span>
                        <span className="cluster-representatives">
                            {cluster.representatives.slice(0, iconLimit).map((data) => <TimelineIcon item={{ type, data }} size={visualState === 'rich' ? 19 : 15} key={data.id} />)}
                        </span>
                    </div>
                    {labelLimit > 0 && cluster.representatives.slice(0, labelLimit).map((item) => <div className="cluster-representative-label" key={`label-${item.id}`}>{getShortItemName(item, visualState === 'rich' ? 26 : 20)}</div>)}
                    <div className="cluster-color-rug" aria-hidden="true">
                        {cluster.items.slice(0, pipLimit).map((item, index) => <span key={`${item.id}-${index}`} style={{ background: getClusterItemColor(item, cluster.kind) }} />)}
                    </div>
                </div>
            );
        };

        const ClusterContent = ({ cluster, onSelect, compact = false }) => (
            <>
                <div className="text-[10px] font-extrabold uppercase tracking-[0.18em] text-blue-600 dark:text-blue-300">
                    {cluster.kind === 'politics' ? 'Political density cluster' : 'Technology density cluster'}
                </div>
                <h3 className="mt-1 text-xl font-extrabold tracking-tight">{cluster.items.length} {cluster.kind === 'politics' ? 'political' : 'technology'} milestones</h3>
                <div className="mt-1 font-mono text-[10px] font-bold uppercase tracking-[0.08em] text-slate-600 dark:text-slate-400">{getClusterRangeLabel(cluster)}</div>
                <p className="mt-2 text-sm leading-5 text-slate-700 dark:text-slate-300">Open an item to focus it on the atlas. Clusters adapt as you zoom or change the label-density setting.</p>
                <div className="mt-3 max-h-72 space-y-1 overflow-auto">
                    {cluster.items.slice(0, compact ? 6 : cluster.items.length).map((data) => {
                        const type = cluster.kind === 'politics' ? 'pol' : 'tech';
                        const item = { type, data, key: itemKey(type, data) };
                        return (
                            <button type="button" className="result-row" key={item.key} onClick={() => onSelect(item)}>
                                <TimelineIcon item={item} size={30} />
                                <span className="min-w-0 flex-1 text-left">
                                    <span className="block truncate text-sm font-extrabold">{data.name}</span>
                                    <span className="block truncate font-mono text-[10px] font-bold text-slate-600 dark:text-slate-400">{getItemDate(item)} / {getItemCategory(item)}</span>
                                    {!compact && <span className="mt-1 block text-xs leading-4 text-slate-600 dark:text-slate-400">{getItemDescription(item)}</span>}
                                </span>
                            </button>
                        );
                    })}
                </div>
            </>
        );

        function TimelineApp() {
            const [mode, setMode] = useState('tech');
            const [zoom, setZoom] = useState(1);
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [hoveredItem, setHoveredItem] = useState(null);
            const [selectedItem, setSelectedItem] = useState(null);
            const [cursorYear, setCursorYear] = useState(null);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [showHelp, setShowHelp] = useState(false);
            const [isTouchDevice, setIsTouchDevice] = useState(false);
            const [isDragging, setIsDragging] = useState(false);

            const containerRef = useRef(null);
            const nextScrollLeft = useRef(null);
            const zoomRef = useRef(1);
            const activePointersRef = useRef(new Map());
            const gestureRef = useRef({ lastMidpoint: null, lastDistance: 0, moved: false });
            const suppressClickUntilRef = useRef(0);
            const lastTapRef = useRef({ time: 0, x: 0, y: 0 });

            const startYear = -10000;
            const endYear = 2035;
            const totalYears = endYear - startYear;
            const PADDING_LEFT = 50;
            const TIMELINE_HEIGHT = 820;
            const MIN_ZOOM = 0.025;
            const MAX_ZOOM = 12;
            const timelineWidth = totalYears * zoom;
            const canvasWidth = timelineWidth + PADDING_LEFT + 280;

            const layoutPolData = useMemo(() => layoutPoliticalLanes(POLITICAL_SYSTEMS), []);

            const layout = useMemo(() => {
                const isSplit = mode === 'merged-split';
                const isOverlap = mode === 'merged-overlap';
                const centerY = TIMELINE_HEIGHT / 2;

                return {
                    techAxisY: isSplit ? TIMELINE_HEIGHT * 0.66 : (isOverlap ? centerY + 34 : 292),
                    polAxisY: isSplit ? TIMELINE_HEIGHT * 0.36 : (isOverlap ? centerY + 34 : 242),
                    polDirection: isSplit || isOverlap ? -1 : 1,
                    showTech: mode === 'tech' || isOverlap || isSplit,
                    showPol: mode === 'pol' || isOverlap || isSplit,
                    eraSet: mode === 'pol' ? POL_ERAS : TECH_ERAS
                };
            }, [mode]);

            const layoutTechData = useMemo(() => {
                const laneCount = mode === 'tech' ? 16 : 11;
                const laneEnds = Array.from({ length: laneCount }, () => -Infinity);

                return INVENTIONS.map((invention) => {
                    const x = (invention.year - startYear) * zoom + PADDING_LEFT;
                    let lane = laneEnds.findIndex((laneEnd) => x - laneEnd > 176);
                    if (lane === -1) lane = laneEnds.indexOf(Math.min(...laneEnds));
                    laneEnds[lane] = x;
                    return { ...invention, lane };
                });
            }, [mode, zoom]);

            const clampZoom = (value) => Math.max(MIN_ZOOM, Math.min(value, MAX_ZOOM));
            const yearToX = (year, zoomValue = zoomRef.current) => (year - startYear) * zoomValue + PADDING_LEFT;

            const screenXToYear = (clientX, zoomValue = zoomRef.current) => {
                const container = containerRef.current;
                if (!container) return startYear;
                const rect = container.getBoundingClientRect();
                return (container.scrollLeft + clientX - rect.left - PADDING_LEFT) / zoomValue + startYear;
            };

            const commitZoom = (newZoom, targetScrollLeft) => {
                const safeZoom = clampZoom(newZoom);
                const container = containerRef.current;
                if (!container) return;

                zoomRef.current = safeZoom;
                if (Math.abs(safeZoom - zoom) < 0.0001) {
                    container.scrollLeft = Math.max(0, targetScrollLeft);
                    return;
                }

                nextScrollLeft.current = Math.max(0, targetScrollLeft);
                setZoom(safeZoom);
            };

            const zoomAtClientX = (newZoom, clientX) => {
                const container = containerRef.current;
                if (!container) return;
                const rect = container.getBoundingClientRect();
                const viewportOffset = clientX - rect.left;
                const yearAtPoint = screenXToYear(clientX);
                const safeZoom = clampZoom(newZoom);
                commitZoom(safeZoom, yearToX(yearAtPoint, safeZoom) - viewportOffset);
            };

            const handleZoom = (newZoom, centerRatio = 0.5) => {
                const container = containerRef.current;
                if (!container) return;
                const rect = container.getBoundingClientRect();
                zoomAtClientX(newZoom, rect.left + rect.width * centerRatio);
            };

            const panByDelta = (deltaX) => {
                if (containerRef.current) containerRef.current.scrollLeft -= deltaX;
            };

            const focusYear = (year, requestedZoom = zoomRef.current) => {
                const container = containerRef.current;
                if (!container) return;
                const safeZoom = clampZoom(requestedZoom);
                commitZoom(safeZoom, yearToX(year, safeZoom) - container.clientWidth / 2);
            };

            const fitTimeline = () => {
                const container = containerRef.current;
                if (!container) return;
                const fitZoom = clampZoom((container.clientWidth - 74) / totalYears);
                commitZoom(fitZoom, 0);
            };

            const resetView = () => focusYear(1800, 1);
            const jumpToModern = () => focusYear(1950, Math.max(zoomRef.current, 1.15));

            useEffect(() => {
                zoomRef.current = zoom;
            }, [zoom]);

            useEffect(() => {
                const updatePointerMode = () => {
                    setIsTouchDevice(window.matchMedia('(pointer: coarse)').matches || window.innerWidth < 768);
                };
                updatePointerMode();
                const query = window.matchMedia('(pointer: coarse)');
                query.addEventListener?.('change', updatePointerMode);
                window.addEventListener('resize', updatePointerMode);
                return () => {
                    query.removeEventListener?.('change', updatePointerMode);
                    window.removeEventListener('resize', updatePointerMode);
                };
            }, []);

            useEffect(() => {
                const handleKeyDown = (event) => {
                    if (event.key !== 'Escape') return;
                    if (showHelp) setShowHelp(false);
                    else setSelectedItem(null);
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [showHelp]);

            useEffect(() => {
                const applyInitialFocus = () => focusYear(1800, 1);
                applyInitialFocus();
                const retry = window.setTimeout(applyInitialFocus, 60);
                return () => window.clearTimeout(retry);
            }, []);

            useLayoutEffect(() => {
                if (nextScrollLeft.current !== null && containerRef.current) {
                    containerRef.current.scrollLeft = nextScrollLeft.current;
                    nextScrollLeft.current = null;
                }
            }, [zoom, mode]);

            const makeItem = (type, data, x = 0, y = 0) => ({ type, data, x, y, key: itemKey(type, data) });
            const isSelected = (type, data) => selectedItem?.key === itemKey(type, data);

            const selectTimelineItem = (event, type, data) => {
                if (Date.now() < suppressClickUntilRef.current) return;
                event.stopPropagation();
                setSelectedItem(makeItem(type, data));
            };

            const selectItemWithKeyboard = (event, type, data) => {
                if (event.key !== 'Enter' && event.key !== ' ') return;
                event.preventDefault();
                setSelectedItem(makeItem(type, data));
            };

            const showHover = (event, type, data) => {
                if (isTouchDevice || activePointersRef.current.size) return;
                setHoveredItem(makeItem(type, data, event.clientX, event.clientY));
            };

            const getPointerMetrics = () => {
                const points = Array.from(activePointersRef.current.values());
                if (!points.length) return { midpoint: null, distance: 0 };
                if (points.length === 1) return { midpoint: points[0], distance: 0 };
                const first = points[0];
                const second = points[1];
                return {
                    midpoint: { x: (first.x + second.x) / 2, y: (first.y + second.y) / 2 },
                    distance: Math.hypot(second.x - first.x, second.y - first.y)
                };
            };

            const updateMouseCursor = (event) => {
                if (event.pointerType !== 'mouse' || activePointersRef.current.size) return;
                setCursorYear(screenXToYear(event.clientX));
                setMousePos({ x: event.clientX, y: event.clientY });
            };

            const handlePointerDown = (event) => {
                if (event.pointerType === 'mouse' && event.button !== 0) return;
                activePointersRef.current.set(event.pointerId, { x: event.clientX, y: event.clientY });
                const metrics = getPointerMetrics();
                gestureRef.current = { lastMidpoint: metrics.midpoint, lastDistance: metrics.distance, moved: false };
                setIsDragging(true);
            };

            const handlePointerMove = (event) => {
                if (!activePointersRef.current.has(event.pointerId)) {
                    updateMouseCursor(event);
                    return;
                }

                const previous = activePointersRef.current.get(event.pointerId);
                activePointersRef.current.set(event.pointerId, { x: event.clientX, y: event.clientY });
                const metrics = getPointerMetrics();
                const gesture = gestureRef.current;
                const traveled = Math.hypot(event.clientX - previous.x, event.clientY - previous.y);
                if (traveled > 2 && !gesture.moved) {
                    gesture.moved = true;
                    try {
                        event.currentTarget.setPointerCapture?.(event.pointerId);
                    } catch {
                        // Some embedded browsers do not expose capture for synthetic pointers.
                    }
                }

                if (metrics.midpoint && gesture.lastMidpoint) {
                    panByDelta(metrics.midpoint.x - gesture.lastMidpoint.x);
                }

                if (activePointersRef.current.size >= 2 && gesture.lastDistance > 0 && metrics.distance > 0) {
                    const ratio = metrics.distance / gesture.lastDistance;
                    if (Math.abs(ratio - 1) > 0.002) zoomAtClientX(zoomRef.current * ratio, metrics.midpoint.x);
                }

                gesture.lastMidpoint = metrics.midpoint;
                gesture.lastDistance = metrics.distance;

                if (gesture.moved) suppressClickUntilRef.current = Date.now() + 160;
                event.preventDefault();
            };

            const finishPointer = (event, cancelled = false) => {
                const wasSinglePointer = activePointersRef.current.size === 1;
                const gesture = gestureRef.current;
                const targetIsItem = event.target.closest?.('[data-timeline-item="true"]');

                activePointersRef.current.delete(event.pointerId);
                try {
                    event.currentTarget.releasePointerCapture?.(event.pointerId);
                } catch {
                    // Capture may already be released after a cancelled gesture.
                }

                if (activePointersRef.current.size) {
                    const metrics = getPointerMetrics();
                    gestureRef.current = { lastMidpoint: metrics.midpoint, lastDistance: metrics.distance, moved: true };
                    return;
                }

                setIsDragging(false);
                if (gesture.moved) {
                    suppressClickUntilRef.current = Date.now() + 160;
                    return;
                }

                if (!cancelled && wasSinglePointer && !targetIsItem) {
                    const now = Date.now();
                    const lastTap = lastTapRef.current;
                    const isDoubleTap = now - lastTap.time < 320 && Math.hypot(event.clientX - lastTap.x, event.clientY - lastTap.y) < 26;
                    setSelectedItem(null);
                    setSelectedCluster(null);
                    if (isDoubleTap) {
                        zoomAtClientX(zoomRef.current * 1.45, event.clientX);
                        lastTapRef.current = { time: 0, x: 0, y: 0 };
                    } else {
                        lastTapRef.current = { time: now, x: event.clientX, y: event.clientY };
                    }
                }
            };

            const handleWheel = (event) => {
                if (event.altKey) {
                    event.preventDefault();
                    zoomAtClientX(zoomRef.current * (event.deltaY > 0 ? 0.9 : 1.1), event.clientX);
                    return;
                }

                if (Math.abs(event.deltaY) > Math.abs(event.deltaX)) {
                    event.preventDefault();
                    if (containerRef.current) containerRef.current.scrollLeft += event.deltaY;
                }
            };

            useEffect(() => {
                const container = containerRef.current;
                if (!container) return;
                const wheelListener = (event) => handleWheel(event);
                container.addEventListener('wheel', wheelListener, { passive: false });
                return () => container.removeEventListener('wheel', wheelListener);
            }, []);

            const getTechLabelY = (lane) => layout.techAxisY + 48 + lane * 27;

            const getPolBarY = (lane) => {
                const laneHeight = 31;
                if (layout.polDirection === -1) return layout.polAxisY - 50 - lane * laneHeight;
                return layout.polAxisY + 40 + lane * laneHeight;
            };

            const gridStep = zoom < 0.12 ? 2000 : zoom < 0.45 ? 1000 : zoom < 2 ? 500 : 100;
            const showTechLabels = zoom > 0.17;

            const theme = isDarkMode ? {
                bg: 'bg-slate-950',
                text: 'text-slate-100',
                subText: 'text-slate-400',
                axis: '#cbd5e1',
                grid: '#1e293b',
                gridText: '#64748b'
            } : {
                bg: 'bg-slate-50',
                text: 'text-slate-900',
                subText: 'text-slate-500',
                axis: '#475569',
                grid: '#e2e8f0',
                gridText: '#94a3b8'
            };

            const renderToolbar = (mobile = false) => (
                <div className={`toolbar-shell ${mobile ? 'mobile-toolbar' : 'desktop-toolbar'}`} aria-label="Timeline navigation controls">
                    <ToolbarButton label="Zoom out" onClick={() => handleZoom(zoomRef.current * 0.82)}>

        function TimelineAppPass2() {

            const [disabledPolTypes, setDisabledPolTypes] = useState([]);
            const [labelDensity, setLabelDensity] = useState(getStoredLabelDensity);
            const [selectedCluster, setSelectedCluster] = useState(null);
            const [hoveredCluster, setHoveredCluster] = useState(null);
            const [isDragging, setIsDragging] = useState(false);
            const [viewport, setViewport] = useState({ scrollLeft: 0, scrollTop: 0, clientWidth: 0, clientHeight: 0, scrollWidth: 1, scrollHeight: 1 });
            const isTouchDevice = viewportProfile.isCoarsePointer || viewportProfile.width < 768;

            const containerRef = useRef(null);
            const nextScrollRef = useRef(null);
            const zoomRef = useRef(zoom);
            const orientationRef = useRef(orientation);
            const activePointersRef = useRef(new Map());
            const gestureRef = useRef({ lastMidpoint: null, lastDistance: 0, moved: false });
            const suppressClickUntilRef = useRef(0);
            const lastTapRef = useRef({ time: 0, x: 0, y: 0 });
            const scrollFrameRef = useRef(null);

            const startYear = -10000;
            const endYear = 2035;
            const totalYears = endYear - startYear;
            const H_PADDING = 50;
            const V_PADDING = 64;
            const MIN_HORIZONTAL_ZOOM = 0.025;
            const MIN_VERTICAL_ZOOM = 0.045;
            const MAX_ZOOM = 12;
            const isVertical = orientation === 'vertical';
            const defaultZoom = isVertical ? 0.38 : 1;
            const horizontalPoliticalLaneCount = useMemo(() => {
                const lanes = layoutPoliticalLanes(RICH_POL_ITEMS.filter((item) => !disabledPolTypes.includes(item.type)));
                return Math.max(1, ...lanes.map((item) => item.lane + 1));
            }, [disabledPolTypes]);
            const horizontalFrame = useMemo(() => getHorizontalFrameBudget({ mode, labelDensity, viewportProfile, politicalLaneCount: horizontalPoliticalLaneCount }), [horizontalPoliticalLaneCount, labelDensity, mode, viewportProfile]);
            const verticalFrame = useMemo(() => getVerticalFrameBudget({ mode, labelDensity, viewportProfile }), [labelDensity, mode, viewportProfile]);
            const H_HEIGHT = horizontalFrame.canvasHeight;
            const timelinePrimarySize = totalYears * zoom;
            const canvasWidth = isVertical
                ? verticalFrame.canvasWidth
                : timelinePrimarySize + H_PADDING + 280;
            const canvasHeight = isVertical ? timelinePrimarySize + V_PADDING * 2 : H_HEIGHT;
            const safeTimelineBounds = useMemo(() => getSafeTimelineBounds({ orientation, canvasWidth, canvasHeight, frame: horizontalFrame }), [canvasHeight, canvasWidth, horizontalFrame, orientation]);

            const horizontalLayout = useMemo(() => {
                return {
                    techAxisY: horizontalFrame.techAxisY,
                    polAxisY: horizontalFrame.polAxisY,
                    polDirection: horizontalFrame.polDirection,
                    topPadding: horizontalFrame.topPadding,
                    bottomPadding: horizontalFrame.bottomPadding
                };
            }, [horizontalFrame]);

            const showsTech = mode === 'tech' || mode.includes('merged');
            const showsPolitics = mode === 'pol' || mode.includes('merged');
            const eraSet = mode === 'pol' ? RICH_POL_ERAS : RICH_TECH_ERAS;
            const visibleTechItems = useMemo(() => RICH_TECH_ITEMS.filter((item) => !item.prelude && !disabledTechCategories.includes(item.category)), [disabledTechCategories]);
            const visiblePolItems = useMemo(() => RICH_POL_ITEMS.filter((item) => !disabledPolTypes.includes(item.type)), [disabledPolTypes]);
            const layoutPolData = useMemo(() => layoutPoliticalLanes(visiblePolItems), [visiblePolItems]);
            const responsiveLaneBudget = useMemo(() => getResponsiveLaneBudget({
                profile: viewportProfile,
                orientation,
                zoom,
                mode,
                hasDetailSheet: Boolean(selectedItem)
            }), [mode, orientation, selectedItem, viewportProfile, zoom]);
            const densityProfile = useMemo(() => getDensityProfile({ orientation, mode, zoom, viewportProfile, labelDensity }), [labelDensity, mode, orientation, viewportProfile, zoom]);

            const verticalAxisX = useMemo(() => {
                return canvasWidth * verticalFrame.axisRatio;
            }, [canvasWidth, verticalFrame.axisRatio]);

            const clampZoom = (value) => Math.max(isVertical ? MIN_VERTICAL_ZOOM : MIN_HORIZONTAL_ZOOM, Math.min(value, MAX_ZOOM));
            const yearToPrimaryCoord = (year, scale = zoomRef.current) => orientationRef.current === 'vertical'
                ? V_PADDING + (endYear - year) * scale
                : H_PADDING + (year - startYear) * scale;
            const primaryCoordToYear = (coord, scale = zoomRef.current) => orientationRef.current === 'vertical'
                ? endYear - (coord - V_PADDING) / scale
                : startYear + (coord - H_PADDING) / scale;

            const screenPointToYear = (clientX, clientY, scale = zoomRef.current) => {
                const container = containerRef.current;
                if (!container) return startYear;
                const rect = container.getBoundingClientRect();
                const coord = orientationRef.current === 'vertical'
                    ? container.scrollTop + clientY - rect.top
                    : container.scrollLeft + clientX - rect.left;
                return primaryCoordToYear(coord, scale);
            };

            const syncViewport = () => {
                if (scrollFrameRef.current) return;
                scrollFrameRef.current = requestAnimationFrame(() => {
                    scrollFrameRef.current = null;
                    const container = containerRef.current;
                    if (!container) return;
                    setViewport({
                        scrollLeft: container.scrollLeft,
                        scrollTop: container.scrollTop,
                        clientWidth: container.clientWidth,
                        clientHeight: container.clientHeight,
                        scrollWidth: container.scrollWidth,
                        scrollHeight: container.scrollHeight
                    });
                });
            };

            const applyPrimaryScroll = (value) => {
                const container = containerRef.current;
                if (!container) return;
                if (orientationRef.current === 'vertical') container.scrollTop = Math.max(0, value);
                else container.scrollLeft = Math.max(0, value);
                syncViewport();
            };

            const commitZoom = (newZoom, targetPrimaryScroll) => {
                const safeZoom = clampZoom(newZoom);
                const previousZoom = zoomRef.current;
                zoomRef.current = safeZoom;
                nextScrollRef.current = Math.max(0, targetPrimaryScroll);
                if (Math.abs(safeZoom - previousZoom) < 0.0001) {
                    applyPrimaryScroll(nextScrollRef.current);
                    nextScrollRef.current = null;
                } else {
                    setZoom(safeZoom);
                }
            };

            const zoomAtClientPoint = (newZoom, clientX, clientY) => {
                const container = containerRef.current;
                if (!container) return;
                const rect = container.getBoundingClientRect();
                const viewportOffset = orientationRef.current === 'vertical' ? clientY - rect.top : clientX - rect.left;
                const yearAtPoint = screenPointToYear(clientX, clientY);
                const safeZoom = clampZoom(newZoom);
                const targetScroll = (orientationRef.current === 'vertical'
                    ? V_PADDING + (endYear - yearAtPoint) * safeZoom
                    : H_PADDING + (yearAtPoint - startYear) * safeZoom) - viewportOffset;
                commitZoom(safeZoom, targetScroll);
            };

            const handleZoom = (newZoom) => {
                const container = containerRef.current;
                if (!container) return;
                const rect = container.getBoundingClientRect();
                zoomAtClientPoint(newZoom, rect.left + rect.width / 2, rect.top + rect.height / 2);
            };

            const panByDelta = (deltaX, deltaY) => {
                const container = containerRef.current;
                if (!container) return;
                if (orientationRef.current === 'vertical') {
                    container.scrollTop -= deltaY;
                    container.scrollLeft -= deltaX * 0.35;
                } else {
                    container.scrollLeft -= deltaX;
                }
                syncViewport();
            };

            const focusYear = (year, requestedZoom = zoomRef.current) => {
                const container = containerRef.current;
                if (!container) return;
                const safeZoom = clampZoom(requestedZoom);
                const clientSize = orientationRef.current === 'vertical' ? container.clientHeight : container.clientWidth;
                const coord = orientationRef.current === 'vertical'
                    ? V_PADDING + (endYear - year) * safeZoom
                    : H_PADDING + (year - startYear) * safeZoom;
                commitZoom(safeZoom, coord - clientSize / 2);
            };

            const getZoomForYearRange = (rangeStart, rangeEnd, requestedOrientation = orientationRef.current) => {
                const container = containerRef.current;
                if (!container) return zoomRef.current;

                const second = points[1];
                return {
